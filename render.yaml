services:
  - type: web
    name: oneplan-range-operation-platform
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: STATE_FILE
        value: /tmp/oneplan-state.json
      - key: STATE_BACKUP_DIR
        value: /tmp/oneplan-backups
      - key: MAX_STATE_BACKUPS
        value: 5
