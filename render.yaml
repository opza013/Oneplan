services:
  - type: web
    name: oneplan-range-operation-platform
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: STATE_FILE
        value: /var/data/oneplan-state.json
      - key: STATE_BACKUP_DIR
        value: /var/data/backups
      - key: MAX_STATE_BACKUPS
        value: 20
      - key: STATE_TOKEN
        sync: false
    disk:
      name: oneplan-data
      mountPath: /var/data
      sizeGB: 1
