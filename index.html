<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>One Plan — Range Operation Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --nav:#06294f; --nav-2:#0a3b6e; --nav-deep:#041b38;
  --primary:#0067b1; --primary-2:#0095da; --primary-3:#36b3ff;
  --sky:#eaf6ff; --bg:#eef3f9; --bg-2:#f6f9fc; --card:#ffffff;
  --line:#dde7f1; --line-2:#eef3f8;
  --text:#0f2236; --muted:#5f7184; --muted-2:#8696a8;
  --green:#16a76a; --green-bg:#e3f7ee;
  --amber:#e8930c; --amber-bg:#fdf1dc;
  --red:#e23b3b; --red-bg:#fde6e6;
  --blue:#2d7ff9; --blue-bg:#e6f0ff;
  --purple:#6d54e6; --purple-bg:#ece8fc;
  --slate:#64748b;
  --shadow-sm:0 1px 3px rgba(15,34,54,.06);
  --shadow:0 8px 24px rgba(15,34,54,.08);
  --shadow-lg:0 18px 48px rgba(15,34,54,.16);
  --radius:14px; --radius-sm:10px;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:"IBM Plex Sans",-apple-system,Segoe UI,Roboto,sans-serif;
  --display:"Sora","IBM Plex Sans",sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:var(--sans); color:var(--text);
  background:
    radial-gradient(1200px 600px at 110% -10%, #dcecff55, transparent 60%),
    var(--bg);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit}
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ---------- Sidebar ---------- */
.sidebar{
  width:248px;flex-shrink:0;color:#eaf4ff;display:flex;flex-direction:column;
  background:linear-gradient(180deg,var(--nav) 0%,var(--nav-2) 48%,var(--nav-deep) 100%);
  box-shadow:6px 0 28px rgba(4,27,56,.22);position:relative;z-index:30;
}
.brand{height:70px;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.10)}
.brand-title{min-width:0;width:100%;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.brand-title b{font-family:var(--display);display:block;font-size:25px;line-height:1.02;letter-spacing:1px;color:#fff;font-weight:800;white-space:nowrap}
.brand-title span{display:block;width:100%;margin-top:5px;font-size:12px;line-height:1.1;color:#9fd0fb;font-weight:400;letter-spacing:.25px;white-space:nowrap;overflow:visible;text-overflow:clip}
.menu-section{color:#7fb6ec;font-size:10px;font-weight:700;letter-spacing:1.1px;padding:16px 20px 6px;text-transform:uppercase}
.menu{display:flex;flex-direction:column;padding:0 10px;gap:3px}
.menu button{appearance:none;border:0;background:transparent;color:#dcecff;padding:10px 12px;border-radius:11px;font-weight:600;text-align:left;display:flex;gap:11px;align-items:center;cursor:pointer;font-size:13.5px;transition:.14s;position:relative}
.menu button:hover{background:rgba(255,255,255,.08)}
.menu button.active{background:#fff;color:#073a68;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.menu button .ico{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.12);font-size:14px;flex-shrink:0}
.menu button.active .ico{background:var(--sky);color:var(--primary)}
.menu button .pill{margin-left:auto;font-size:10px;font-weight:700;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
.menu button.active .pill{background:var(--red)}
.side-foot{margin-top:auto;padding:12px}
.rolebox{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:11px}
.rolebox label{font-size:10px;color:#9fd0fb;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.rolebox .row{display:flex;align-items:center;gap:10px;margin-top:8px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#fff,#bfe1ff);color:#073a68;display:grid;place-items:center;font-size:18px;font-weight:700;flex-shrink:0}
.rolebox select{flex:1;background:rgba(255,255,255,.92);border:0;border-radius:8px;padding:6px 8px;font-size:12px;font-weight:600;color:#0f2236;cursor:pointer}
.rolebox .uname{font-size:12.5px;font-weight:700}
.rolebox .urole{font-size:10.5px;color:#9fd0fb}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:64px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 22px;z-index:20}
.title-wrap .title{font-family:var(--display);font-size:19px;font-weight:700;line-height:1.1}
.title-wrap .crumb{font-size:11.5px;color:var(--muted);margin-top:2px}
.search{margin-left:auto;position:relative}
.search input{width:300px;max-width:38vw;border:1px solid var(--line);background:var(--bg-2);border-radius:10px;padding:9px 12px 9px 34px;font-size:13px;outline:none;transition:.15s}
.search input:focus{border-color:var(--primary-2);background:#fff;box-shadow:0 0 0 3px #0095da22}
.search:before{content:"⌕";position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.bell{position:relative;font-size:19px;cursor:pointer;color:var(--slate)}
.bell .badge{position:absolute;top:-6px;right:-7px;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;border-radius:20px;padding:1px 5px;min-width:16px;text-align:center}
.content{flex:1;overflow:auto;padding:22px;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:11px;height:11px}
.content::-webkit-scrollbar-thumb{background:#c7d6e6;border-radius:20px;border:3px solid var(--bg)}
.page{display:none;animation:fade .25s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Buttons ---------- */
.btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:10px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.14s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{border-color:#b9cce0;background:var(--bg-2)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;box-shadow:0 6px 16px #0067b144}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{background:var(--sky);border-color:#cfe6fb;color:var(--primary)}
.btn.success{background:var(--green);color:#fff;border:0}
.btn.danger{background:#fff;border-color:#f3c4c4;color:var(--red)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:5px 9px;font-size:11.5px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.disabled-role{opacity:.45;cursor:not-allowed}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px 18px}
.card+.card{margin-top:14px}
.section-title{font-family:var(--display);font-size:14px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.section-title .small{font-family:var(--sans)}
.small{font-size:11.5px;color:var(--muted);font-weight:500}
.mono{font-family:var(--mono)}
.grid{display:grid;gap:14px}

/* ---------- KPI ---------- */
.kpi-grid{grid-template-columns:repeat(6,1fr)}
.kpi{display:flex;gap:13px;align-items:center;padding:15px 16px}
.kpi .icon{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px;color:#fff;flex-shrink:0;font-weight:700}
.kpi .label{font-size:11.5px;color:var(--muted);font-weight:600}
.kpi .num{font-family:var(--mono);font-size:25px;font-weight:700;line-height:1.1;margin-top:1px}
.kpi .sub{font-size:10.5px;color:var(--muted-2);margin-top:1px}
.kpi.click{cursor:pointer;transition:.15s}
.kpi.click:hover{border-color:var(--primary-2);box-shadow:var(--shadow);transform:translateY(-2px)}

/* ---------- Hero ---------- */
.hero{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:16px}
.hero-card{background:linear-gradient(120deg,var(--nav) 0%,var(--primary) 75%,var(--primary-2) 130%);color:#fff;border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden}
.hero-card:after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#ffffff22,transparent 70%)}
.hero-card h2{font-family:var(--display);margin:0 0 6px;font-size:22px}
.hero-card p{margin:0;font-size:13px;opacity:.9;max-width:560px;line-height:1.5}
.hero-meta{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.hero-meta div{font-size:11px;opacity:.85}
.hero-meta b{display:block;font-family:var(--mono);font-size:17px}
.quick-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
.quick button{text-align:left;border:1px solid var(--line);background:var(--bg-2);border-radius:11px;padding:11px;cursor:pointer;transition:.14s}
.quick button:hover{border-color:var(--primary-2);background:#fff;box-shadow:var(--shadow-sm)}
.quick button b{display:block;font-size:13px}
.quick button .small{display:block;margin-top:2px}

/* ---------- Tables ---------- */
.tbl-wrap{overflow:auto;border-radius:10px;border:1px solid var(--line-2)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--bg-2);text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);white-space:nowrap;z-index:2}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{color:var(--primary)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tbody tr:hover{background:var(--bg-2)}
tbody tr:last-child td{border-bottom:0}
td.num,th.num{text-align:right;font-family:var(--mono)}

/* ---------- Status pills ---------- */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px;white-space:nowrap}
.pill:before{content:"●";font-size:9px}
.st-OnTrack{background:var(--green-bg);color:#0c7d4d}
.st-AtRisk{background:var(--amber-bg);color:#9a5e00}
.st-Delayed{background:var(--red-bg);color:#b81f1f}
.st-Completed{background:#e7eefb;color:#244e9c}
.st-Cancelled{background:#eceff3;color:#62707f}
.st-Over{background:var(--red-bg);color:#b81f1f}
.st-Watch{background:var(--amber-bg);color:#9a5e00}
.st-Available{background:var(--green-bg);color:#0c7d4d}
.tag{display:inline-block;font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 7px;background:var(--bg-2);border:1px solid var(--line);color:var(--muted)}
.apv{font-size:11px;font-weight:700}

/* ---------- Toolbar / filters ---------- */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.fld select,.fld input{border:1px solid var(--line);background:var(--bg-2);border-radius:9px;padding:7px 9px;font-size:12px;outline:none;min-width:104px;transition:.14s}
.fld select:focus,.fld input:focus{border-color:var(--primary-2);background:#fff;box-shadow:0 0 0 3px #0095da22}
.segmented{display:inline-flex;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.segmented button{border:0;background:transparent;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
.segmented button.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}
.segmented button:disabled{opacity:.4;cursor:not-allowed}
.toolbar .spacer{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.chip-f{display:inline-flex;align-items:center;gap:6px;background:var(--blue-bg);color:#244e9c;border:1px solid #cfe0fb;border-radius:20px;padding:4px 6px 4px 11px;font-size:11.5px;font-weight:600}
.chip-f button{border:0;background:#ffffffaa;color:#244e9c;border-radius:50%;width:17px;height:17px;cursor:pointer;font-size:11px;line-height:1}

/* Searchable multi-select filters */
.multi-select{position:relative;min-width:150px}
.multi-trigger{width:100%;min-width:150px;max-width:220px;height:31px;border:1px solid var(--line);background:var(--bg-2);border-radius:9px;padding:6px 9px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;color:var(--text);cursor:pointer;text-align:left}
.multi-trigger:hover{background:#fff;border-color:#b8c7d8}
.multi-trigger:focus-visible{outline:none;border-color:var(--primary-2);box-shadow:0 0 0 3px #0095da22}
.multi-trigger .multi-value{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.multi-trigger .multi-caret{font-size:10px;color:var(--muted);flex:none}
.multi-menu{display:none;position:absolute;z-index:80;top:calc(100% + 5px);left:0;width:280px;max-width:min(88vw,360px);background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 36px rgba(15,34,54,.2);padding:9px}
.multi-select.open .multi-menu{display:block}
.multi-search{width:100%;height:32px!important;min-width:0!important;background:#fff!important;margin-bottom:7px}
.multi-actions,.multi-footer{display:flex;align-items:center;gap:6px}
.multi-actions{justify-content:space-between;border-bottom:1px solid var(--line-2);padding-bottom:7px;margin-bottom:5px}
.multi-actions button{border:0;background:transparent;color:var(--primary);font-size:11px;font-weight:700;cursor:pointer;padding:3px 4px}
.multi-options{max-height:240px;overflow:auto;padding:2px 0}
.multi-option{display:flex;align-items:center;gap:8px;padding:6px 7px;border-radius:7px;font-size:12px;cursor:pointer;line-height:1.2}
.multi-option:hover{background:var(--blue-bg)}
.multi-option input{width:15px;height:15px;min-width:15px;margin:0;accent-color:var(--primary-2)}
.multi-option span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.multi-limit{padding:7px;color:var(--muted);font-size:10.5px;text-align:center;border-top:1px solid var(--line-2)}
.multi-empty{padding:16px 8px;text-align:center;color:var(--muted);font-size:11.5px}
.multi-footer{justify-content:flex-end;border-top:1px solid var(--line-2);padding-top:8px;margin-top:5px}
.multi-footer .btn{min-width:58px}
@media(max-width:720px){.multi-select,.multi-trigger{min-width:100%;max-width:none}.multi-menu{position:fixed;left:12px;right:12px;top:18%;width:auto;max-width:none}.multi-options{max-height:42vh}}

/* ---------- Gantt ---------- */
.gantt-shell{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.gantt-top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line-2);flex-wrap:wrap}
.gantt-top h3{font-family:var(--display);margin:0;font-size:15px}
.gantt-scroll{overflow:auto;max-height:64vh;position:relative}
.gantt{position:relative;min-width:max-content}
.grow{display:grid;grid-template-columns:260px 1fr;border-bottom:1px solid var(--line-2)}
.grow.head{position:sticky;top:0;z-index:6;background:var(--bg-2)}
.gcell-left{padding:8px 12px;border-right:1px solid var(--line);background:#fff;position:sticky;left:0;z-index:5}
.grow.head .gcell-left{background:var(--bg-2);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center}
.gtime{position:relative}
.gmonths{display:flex;border-bottom:1px solid var(--line-2)}
.gmonth{padding:6px 8px;font-size:11px;font-weight:700;color:var(--primary);border-right:1px solid var(--line-2);text-align:center;background:#f2f8ff}
.gcols{display:flex}
.gcol{border-right:1px dashed #e7eef6;text-align:center;padding:5px 2px;font-size:11px;font-weight:600;flex-shrink:0}
.gcol .wd{font-size:9.5px;color:var(--muted);font-weight:600;display:block}
.gcol.wknd{background:#f8fafc}
.gtl{position:relative;height:100%}
.pname{font-size:12.5px;font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.powner{font-size:10.5px;color:var(--muted);margin:2px 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gbarwrap{position:relative;height:54px}
.gsummary{position:absolute;height:5px;border-radius:4px;background:#cdd9e6;top:5px;opacity:.9}
.gsummary i{position:absolute;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary-2),var(--primary));left:0}
.ms{position:absolute;height:18px;border-radius:6px;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px;white-space:nowrap;overflow:hidden;cursor:pointer;box-shadow:0 2px 5px rgba(15,34,54,.18);transition:.12s;border:0;font-family:inherit}
.ms:hover{transform:scaleY(1.18);z-index:9;box-shadow:0 4px 10px rgba(15,34,54,.3)}
.ms.done{opacity:.62}
.ms.delay{outline:2px solid #ffffff;box-shadow:0 0 0 2px var(--red)}
.ms.risk{box-shadow:0 0 0 2px var(--amber)}
.ms.sel{outline:2px solid #fff;box-shadow:0 0 0 2px #111,0 4px 10px rgba(0,0,0,.3);z-index:8}
.ms .ck{margin-left:3px}
.today-pin{position:absolute;top:2px;width:0;height:42px;border-left:2px solid var(--red);z-index:9;pointer-events:none}
.today-pin:before{content:"";position:absolute;top:0;left:0;transform:translateX(-1px);width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:11px solid var(--red)}
.today-pin span{position:absolute;top:0;left:12px;background:var(--red);color:#fff;font-size:8.5px;font-weight:800;padding:1px 5px;border-radius:4px;letter-spacing:.2px;white-space:nowrap;box-shadow:0 2px 5px rgba(15,34,54,.18)}
.today-pin:after{content:"";position:absolute;bottom:0;left:-4px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 2px #fff}
/* milestone colors */
.c-KO{background:#7357ff}.c-NWT1{background:#00a3ff}.c-NWT3{background:#00a3ff}
.c-SPR{background:#0095da}.c-RSO{background:#16a76a}.c-LSO{background:#0aa3a3}
.c-POG{background:#e8930c}.c-DD{background:#e23b3b}.c-COMM{background:#6d54e6}
.c-ORD{background:#d4459e}.c-IMP{background:#0c7d4d}
.legend-row{display:flex;flex-wrap:wrap;gap:10px 16px}
.lg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600}
.lg .sw{width:13px;height:13px;border-radius:4px;flex-shrink:0}

/* ---------- Donut / charts ---------- */
.dash-3{grid-template-columns:1.1fr 1.4fr 1.1fr}
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut{width:130px;height:130px;border-radius:50%;flex-shrink:0;position:relative;display:grid;place-items:center}
.donut:after{content:"";position:absolute;inset:20px;background:#fff;border-radius:50%}
.donut .ctr{position:relative;z-index:2;text-align:center}
.donut .ctr b{font-family:var(--mono);font-size:24px;display:block;line-height:1}
.donut .ctr span{font-size:10px;color:var(--muted)}
.dlegend{display:flex;flex-direction:column;gap:7px}
.dlg{display:flex;align-items:center;gap:8px;font-size:12px}
.dlg .dot{width:10px;height:10px;border-radius:3px}
.dlg b{margin-left:auto;font-family:var(--mono)}
.impl-legend{display:flex;align-items:center;gap:8px 12px;flex-wrap:wrap;margin:8px 0 7px}
.impl-legend span{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:600;color:var(--muted);white-space:nowrap}
.impl-legend i{width:9px;height:9px;border-radius:2px;display:inline-block;box-shadow:inset 0 0 0 1px rgba(15,34,54,.08)}
.impl-chart{display:grid;grid-template-columns:31px minmax(0,1fr);gap:5px;height:170px;margin-top:2px}
.impl-axis{position:relative;height:139px;margin-top:2px;font-family:var(--mono);font-size:8.5px;color:var(--muted-2)}
.impl-axis span{position:absolute;right:1px;transform:translateY(50%)}
.impl-axis .a100{top:-5px;transform:none}.impl-axis .a75{bottom:75%}.impl-axis .a50{bottom:50%}.impl-axis .a25{bottom:25%}.impl-axis .a0{bottom:-3px}
.impl-plot{position:relative;min-width:0;height:139px;border-left:1px solid #cad7e4;border-bottom:1px solid #cad7e4;background:repeating-linear-gradient(to top,transparent 0,transparent calc(25% - 1px),#dbe5ef calc(25% - 1px),#dbe5ef 25%)}
.impl-cols{position:absolute;inset:0 4px 0 6px;display:grid;grid-template-columns:repeat(8,minmax(24px,1fr));gap:7px;align-items:end}
.impl-week{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;min-width:0}
.impl-bar-area{height:100%;width:100%;display:flex;align-items:flex-end;justify-content:center;padding-top:17px}
.impl-stackbar{width:min(31px,78%);min-height:2px;display:flex;flex-direction:column-reverse;position:relative;border-radius:5px 5px 0 0;overflow:visible;transition:height .35s ease;box-shadow:0 1px 2px rgba(15,34,54,.08)}
.impl-stackbar.over{outline:2px solid var(--red);outline-offset:1px}
.impl-stackbar.current{outline:2px solid var(--nav);outline-offset:2px;box-shadow:0 0 0 4px #0067b11c}
.impl-seg{width:100%;min-height:1px;border-top:1px solid rgba(255,255,255,.75);cursor:help}
.impl-seg:first-child{border-top:0}
.impl-total{position:absolute;left:50%;top:-17px;transform:translateX(-50%);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text);white-space:nowrap}
.impl-week-labels{grid-column:2;display:grid;grid-template-columns:repeat(8,minmax(24px,1fr));gap:7px;padding:0 4px 0 6px;margin-top:3px}
.impl-wk{text-align:center;font-size:9px;color:var(--muted);font-weight:600;white-space:nowrap}
.impl-wk.cur{color:var(--primary);font-weight:800}.impl-wk.prev{opacity:.62}
.impl-nav{margin-top:3px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:9.5px}
.impl-loading{height:184px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;background:linear-gradient(90deg,transparent,#f7fafc,transparent);border-radius:10px}
.impl-loading:before{content:"";width:14px;height:14px;border:2px solid #cad7e4;border-top-color:var(--primary);border-radius:50%;margin-right:8px;animation:implSpin .8s linear infinite}
@keyframes implSpin{to{transform:rotate(360deg)}}
@media(max-width:1100px){.impl-cols,.impl-week-labels{gap:4px}.impl-stackbar{width:min(27px,82%)}.impl-legend{gap:6px 9px}.impl-legend span{font-size:9px}}
.trend-svg{width:100%;height:auto;display:block}
.trend-legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.trend-legend span{font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.legend-line{width:18px;height:3px;border-radius:3px;display:inline-block}
.trend-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.tmini{background:var(--bg-2);border:1px solid var(--line-2);border-radius:10px;padding:9px 11px}
.tmini b{font-family:var(--mono);font-size:16px;display:block}

/* ---------- Utilization bar ---------- */
.util{display:flex;align-items:center;gap:7px}
.util-bar{flex:1;height:7px;background:#eef2f7;border-radius:20px;overflow:hidden;min-width:60px}
.util-bar i{display:block;height:100%;border-radius:20px}

/* ---------- Calendar ---------- */
.cal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.cal-title{font-family:var(--display);font-size:17px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-head{font-size:11px;font-weight:700;color:var(--muted);text-align:center;padding:4px;text-transform:uppercase}
.cal-day{min-height:96px;border:1px solid var(--line-2);border-radius:10px;padding:6px;background:#fff;position:relative;overflow:hidden}
.cal-day.out{background:var(--bg-2);opacity:.6}
.cal-day.today{border-color:var(--primary-2);box-shadow:0 0 0 2px #0095da33}
.cal-date{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;margin-bottom:4px}
.cal-wk{font-size:9px;color:var(--muted-2);font-weight:600}
.cal-ev{font-size:9.5px;font-weight:600;color:#fff;border-radius:5px;padding:1px 5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-more{font-size:9.5px;color:var(--primary);font-weight:700;margin-top:2px;cursor:pointer}
.cal-today-tag{font-size:9.5px;font-weight:800;color:#fff;background:var(--red);border-radius:5px;padding:1px 6px}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(8,22,40,.55);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:30px 16px;overflow:auto}
.modal-bg.active{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:880px;box-shadow:var(--shadow-lg);animation:pop .2s ease}
.modal.sm{max-width:520px}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal-head h2{font-family:var(--display);margin:0;font-size:18px}
.modal-head .x{border:0;background:var(--bg-2);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:15px}
.modal-body{padding:18px 20px;max-height:66vh;overflow:auto}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:11px;font-weight:700;color:var(--muted)}
.ff label .req{color:var(--red)}
.ff input,.ff select{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;background:var(--bg-2);outline:none}
.ff input:focus,.ff select:focus{border-color:var(--primary-2);background:#fff;box-shadow:0 0 0 3px #0095da22}
.ff.err input,.ff.err select{border-color:var(--red);background:var(--red-bg)}
.ff .msg{font-size:10.5px;color:var(--red);font-weight:600;display:none}
.ff.err .msg{display:block}
.store-select-panel{border:1px solid var(--line);border-radius:12px;background:var(--bg-2);padding:10px;margin-top:6px}
.store-select-summary{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.store-select-summary b{font-family:var(--mono);font-size:13px}
.store-filter-grid{display:grid;grid-template-columns:1fr 1fr 1.2fr 1.2fr;gap:9px;margin-bottom:10px}
.store-filter-grid .ff input,.store-filter-grid .ff select{background:#fff}
.bulk-format-box{min-height:92px}
.store-action-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.store-pick{border:1px solid var(--line);border-radius:10px;padding:10px;max-height:260px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;background:#fff}
.store-pick label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;background:var(--bg-2);border:1px solid var(--line-2);border-radius:8px;padding:6px 8px;cursor:pointer}
.store-pick label:hover{border-color:var(--primary-2);background:#fff}
.store-pick label.checked{border-color:var(--primary-2);background:var(--sky)}
.store-pick input{flex-shrink:0}
@media(max-width:720px){.store-filter-grid{grid-template-columns:1fr}.store-pick{grid-template-columns:1fr}}
.ms-form-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line-2)}
.ms-form-row b{font-size:12px}
.ms-form-row input,.ms-form-row select{border:1px solid var(--line);border-radius:8px;padding:6px 7px;font-size:11.5px;background:#fff}
.ms-form-row input.bad{border-color:var(--red);background:var(--red-bg)}
.cap-preview{margin-top:14px;border-radius:12px;padding:13px;font-size:12.5px}
.cap-preview.ok{background:var(--green-bg);border:1px solid #bfe9d4}
.cap-preview.warn{background:var(--amber-bg);border:1px solid #f3d9a4}
.cap-preview.block{background:var(--red-bg);border:1px solid #f3bcbc}
.cap-preview b{font-weight:700}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--line);flex-wrap:wrap}
.modal-foot .left{margin-right:auto;font-size:11.5px;color:var(--muted);align-self:center}

/* timeline / history */
.hist{list-style:none;margin:0;padding:0}
.hist li{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--line-2)}
.hist .dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.hist .meta{font-size:11px;color:var(--muted)}

/* banner */
.banner{display:flex;gap:10px;align-items:center;background:var(--amber-bg);border:1px solid #f3d9a4;color:#7a5200;border-radius:12px;padding:11px 14px;font-size:12.5px;margin-bottom:14px}
.banner.info{background:var(--blue-bg);border-color:#cfe0fb;color:#244e9c}
.empty{padding:34px;text-align:center;color:var(--muted);font-size:13px}

/* pagination */
.pager{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}
.pager .pg-btns{display:flex;gap:5px}
.pager .pg-btns button{min-width:32px}
.pager .pg-btns button.on{background:var(--primary);color:#fff;border-color:var(--primary)}

/* responsive */
@media(max-width:1280px){ .kpi-grid{grid-template-columns:repeat(3,1fr)} }
@media(max-width:1024px){
  .sidebar{width:74px}.brand-title,.menu-section,.menu span:not(.ico),.rolebox .uname,.rolebox .urole,.rolebox label{display:none}
  .brand{justify-content:center;padding:0}.menu button{justify-content:center}.rolebox{padding:7px}.rolebox .row{flex-direction:column}.rolebox select{font-size:10px;min-width:0}
  .hero,.dash-3{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:720px){
  .content{padding:14px}.kpi-grid{grid-template-columns:repeat(2,1fr)}
  .search input{width:140px}.topbar{padding:0 12px;gap:10px}
  .form-grid{grid-template-columns:1fr}.quick{grid-template-columns:1fr}
  .trend-sum{grid-template-columns:1fr 1fr}.ms-form-row{grid-template-columns:1fr 1fr}
  .resp-cards thead{display:none}
  .resp-cards tbody tr{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .resp-cards tbody td{border:0;padding:2px 0}
  .resp-cards tbody td:before{content:attr(data-l);display:block;font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
}

/* ---------- Detail Plan ---------- */
.project-link{border:0;background:transparent;padding:0;color:var(--text);font:inherit;font-weight:700;cursor:pointer;text-align:left;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-link:hover{color:var(--primary);text-decoration:underline}
.detail-filter .fld.project-select{min-width:360px;flex:1}
.detail-filter .detail-project-search{min-width:210px}
.detail-filter .detail-project-search input{min-width:210px;background:#fff}
.detail-summary{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;margin-top:14px}
.detail-summary .mini{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.detail-summary .mini span{display:block;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.detail-summary .mini b{font-size:13px;line-height:1.25}
.detail-gantt{position:relative}
.detail-gantt .gantt-scroll{max-height:52vh}
.detail-gantt .gbarwrap{height:42px}
.detail-gantt .grow{grid-template-columns:300px 1fr}
.detail-gantt .ms{top:12px!important;height:19px;border:0;cursor:pointer;font-family:inherit}
.detail-gantt .ms:focus-visible,.milestone-open-btn:focus-visible{outline:3px solid #bfdbfe;outline-offset:2px}
.milestone-open-btn{border:0;cursor:pointer;font-family:inherit;line-height:1}
.milestone-open-btn:hover{filter:brightness(.92);transform:translateY(-1px)}
.detail-milestone-shade{position:absolute;inset:0;background:rgba(8,22,40,.24);z-index:24;opacity:0;pointer-events:none;transition:opacity .18s ease}
.detail-milestone-shade.active{opacity:1;pointer-events:auto}
.detail-milestone-panel{position:absolute;z-index:25;top:0;right:0;bottom:0;width:min(410px,94%);background:#fff;border-left:1px solid var(--line);box-shadow:-14px 0 30px rgba(15,34,54,.2);transform:translateX(104%);transition:transform .2s ease;display:flex;flex-direction:column}
.detail-milestone-panel.active{transform:translateX(0)}
.milestone-panel-head{display:flex;align-items:flex-start;gap:10px;padding:14px 15px;border-bottom:1px solid var(--line);background:#f8fafc}
.milestone-panel-title{min-width:0;flex:1}
.milestone-panel-title h3{font-family:var(--display);font-size:15px;margin:1px 0 3px;line-height:1.25}
.milestone-panel-title .small{line-height:1.35}
.milestone-panel-close{border:0;background:var(--bg-2);width:31px;height:31px;border-radius:8px;cursor:pointer;font-size:15px;flex-shrink:0}
.milestone-panel-body{padding:13px 15px 16px;overflow:auto;min-height:0}
.milestone-panel-status{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:11px}
.milestone-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.milestone-info{border:1px solid var(--line);border-radius:8px;padding:8px 9px;background:#fff;min-width:0}
.milestone-info span{display:block;font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.25px;margin-bottom:3px}
.milestone-info b{display:block;font-size:11px;line-height:1.35;overflow-wrap:anywhere}
.milestone-date-editor{grid-column:1/-1;border:1px solid #bfdbfe;border-radius:9px;padding:9px;background:#eff6ff}
.milestone-date-editor .date-editor-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;font-size:10px;font-weight:800;color:#1e3a5f}
.milestone-date-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.milestone-date-field label{display:block;font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.25px;margin-bottom:3px}
.milestone-date-field input{width:100%;height:32px;border:1px solid var(--line);border-radius:7px;padding:4px 7px;background:#fff;font:600 11px var(--body);color:var(--ink)}
.milestone-date-field input:focus{outline:2px solid #bfdbfe;border-color:#60a5fa}
.milestone-date-save{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.milestone-date-save .small{font-size:9px;line-height:1.3}
@media(max-width:520px){.milestone-date-fields{grid-template-columns:1fr}.milestone-date-field input{height:36px;font-size:12px}}
.milestone-panel-section{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;margin:4px 0 7px}
.panel-nextstep-list{display:flex;flex-direction:column;gap:6px}
.panel-nextstep{border:1px solid var(--line);border-radius:8px;padding:8px 9px;background:#fff}
.panel-nextstep.overdue{border-color:#f5b8b8;background:#fff8f8}
.panel-step-title{display:flex;align-items:flex-start;gap:7px;font-size:11px;font-weight:700;line-height:1.35}
.panel-step-index{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;border-radius:50%;background:var(--blue-bg);color:var(--primary);font-size:9px;font-weight:800;flex-shrink:0}
.panel-step-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:6px 0 0 25px;font-size:9.5px;color:var(--muted)}
.panel-step-status{display:inline-flex;padding:2px 6px;border-radius:999px;background:#eef4fb;color:var(--text);font-weight:700}
.panel-empty{border:1px dashed #cbd5e1;border-radius:8px;padding:10px;color:var(--muted);font-size:10.5px;background:#fbfdff}
.milestone-panel-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-2)}
.activity-nextstep-card.activity-focus{box-shadow:0 0 0 3px #bfdbfe;transition:box-shadow .2s ease}
@media(max-width:700px){.detail-milestone-panel{position:fixed;top:58px;bottom:0;width:94%;z-index:120}.detail-milestone-shade{position:fixed;top:58px;z-index:119}.milestone-info-grid{grid-template-columns:1fr 1fr}}

/* Comfortable compact milestone rows.
   Readable controls are restored while cards remain content-driven with no fixed height. */
.detail-activity-section{padding:12px 13px}
.detail-activity-section>.section-title{font-size:13px;margin-bottom:8px;gap:7px}
.detail-activity-section>.section-title .small{font-size:10px}
.detail-activity-section>.section-title .btn.sm{padding:5px 9px;font-size:10.5px;border-radius:6px}
.activity-stack{display:flex;flex-direction:column;gap:7px}
.activity-nextstep-card{border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden;font-size:11px;min-height:0}
.activity-nextstep-head{display:flex;align-items:center;gap:7px;padding:7px 9px;background:#f8fafc;border-bottom:1px solid var(--line);flex-wrap:nowrap;min-height:0}
.activity-nextstep-head .activity-main{min-width:0;flex:1;display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap}
.activity-nextstep-head .activity-main>div:first-child{display:flex;align-items:center;min-width:0;overflow:hidden}
.activity-nextstep-head .activity-main b{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.activity-nextstep-head .activity-main>.small{font-size:9.5px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%}
.activity-nextstep-head .activity-meta{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;flex-shrink:0}
.activity-nextstep-head .activity-meta .pill{font-size:9px;padding:2px 6px;gap:3px}
.activity-nextstep-head .activity-meta .pill:before{font-size:7px}
.activity-nextstep-head .activity-meta .btn.sm{padding:4px 7px;font-size:10px;border-radius:6px;gap:4px}
.activity-code{display:inline-flex;min-width:36px;justify-content:center;padding:3px 5px;border-radius:5px;color:#fff;font-size:9px;font-weight:800;margin-right:5px}
.nextstep-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--blue-bg);color:var(--primary);font-size:9px;font-weight:800;margin-left:5px}
.nextstep-stack{display:flex;flex-direction:column;gap:5px;padding:6px 7px;min-height:0}
.nextstep-item{display:grid;grid-template-columns:22px minmax(190px,1fr) 126px 126px auto;gap:6px;align-items:center;border:1px solid var(--line);border-radius:6px;padding:5px 6px;background:#fff;min-height:0}
.nextstep-item:hover{border-color:#bfd2ee;box-shadow:0 1px 4px rgba(23,54,93,.05)}
.nextstep-index{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--blue-bg);color:var(--primary);font-size:9px;font-weight:800;margin:0}
.nextstep-field{min-width:0;position:relative}
.nextstep-field label{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.nextstep-input{width:100%;height:30px;min-width:0;border:1px solid var(--line);border-radius:6px;padding:4px 7px;font-size:11px;line-height:1.2;background:#fff}
.nextstep-input:focus{outline:2px solid #dbeafe;border-color:var(--primary)}
.nextstep-status{min-width:110px}
.nextstep-actions{display:flex;gap:4px;align-items:center;padding:0;white-space:nowrap}
.nextstep-actions .btn.sm{padding:4px 7px;font-size:10px;border-radius:6px;gap:3px;min-height:28px}
.nextstep-save:disabled,.nextstep-save:disabled:hover{background:#e5e7eb!important;color:#94a3b8!important;border:1px solid #d1d5db!important;box-shadow:none!important;filter:none!important;opacity:1;cursor:default;transform:none}
.nextstep-save:not(:disabled){background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;box-shadow:0 6px 16px #0067b144}
.delete-confirm-body{display:flex;gap:13px;align-items:flex-start}
.delete-confirm-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--red-bg);color:var(--red);font-size:20px;font-weight:800;flex:none}
.delete-confirm-copy{min-width:0}
.delete-confirm-copy p{margin:0 0 8px;font-size:12.5px;line-height:1.45}
.delete-confirm-item{border:1px solid #f1caca;background:#fff8f8;border-radius:9px;padding:9px 10px;font-size:11.5px;line-height:1.4;overflow-wrap:anywhere}
.nextstep-empty{border:1px dashed #cbd5e1;border-radius:6px;padding:7px 9px;text-align:left;color:var(--muted);background:#fbfdff;font-size:10px;line-height:1.3}
.nextstep-summary{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.due-over{color:var(--red);font-weight:800}

.cloud-sync-pill{height:34px;display:inline-flex;align-items:center;gap:7px;padding:0 11px;border:1px solid #dbe3ef;border-radius:999px;background:#f8fafc;color:#475569;font:600 11px/1 inherit;white-space:nowrap;cursor:pointer}
.cloud-sync-pill:hover{background:#f1f5f9}
.cloud-sync-pill .cloud-dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;box-shadow:0 0 0 3px rgba(148,163,184,.14)}
.cloud-sync-pill[data-state="synced"]{color:#047857;border-color:#bbf7d0;background:#f0fdf4}.cloud-sync-pill[data-state="synced"] .cloud-dot{background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.14)}

.cloud-sync-pill[data-state="conflict"],.cloud-sync-pill[data-state="error"]{color:#b91c1c;border-color:#fecaca;background:#fef2f2}.cloud-sync-pill[data-state="conflict"] .cloud-dot,.cloud-sync-pill[data-state="error"] .cloud-dot{background:#ef4444}
@keyframes cloudPulse{50%{opacity:.35;transform:scale(.75)}}
.cloud-state-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
.cloud-state-kpi{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;min-width:0}.cloud-state-kpi span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.04em}.cloud-state-kpi b{display:block;margin-top:4px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cloud-token-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:end}
.cloud-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
@media(max-width:900px){.cloud-sync-pill .cloud-label{display:none}.cloud-sync-pill{width:34px;padding:0;justify-content:center}.cloud-state-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.cloud-state-grid{grid-template-columns:1fr}.cloud-token-row{grid-template-columns:1fr}}

function seedStores(){
  return EMBEDDED_STORE_MASTER.map(s=>({
    id:s.id,
    no:String(s.no),
    name:s.name,
    format:s.format,
    zone:s.zone,
    capacity:Number(s.capacity)||CAP_BY_FORMAT[s.format]||2580,
    capacityHours:s.capacityHours
  }));
}
function seedProjects(stores){
  const year=SETTINGS.planYear;
  const t=today();
  const nowWk=isoWeekYear(t)===year?isoWeek(t):26; // anchor near real week if in plan year, else mid-year
  const projects=[]; let idn=1000; let campaign=0;
  const byFmt=Object.fromEntries(FORMATS.map(f=>[f,stores.filter(s=>s.format===f)]));
  const campaignFormat=FORMATS.find(f=>/hyper/i.test(f))||FORMATS[0];
  const sharedHyper=(byFmt[campaignFormat]||stores).slice(0,5).map(s=>s.id);   // overload these on purpose
  for(let i=0;i<108;i++){
    idn++;
    const type=TYPES[i%TYPES.length];
    const division=DIVISIONS[i%DIVISIONS.length];
    const dept=DEPTS[division][i%DEPTS[division].length];
    const owner=OWNERS[i%OWNERS.length];
    let format=FORMATS[i%FORMATS.length];
    // base kickoff spread across the year
    let koWeek=Math.max(1,2+Math.floor(i*44/108));
    let startD;
    const isCampaign = i%7===0;     // ~15 projects form a capacity peak near "today"
    if(isCampaign){
      format=campaignFormat;
      const impWk=Math.min(isoWeeksInYear(year), nowWk + (campaign%2)); // this week or next
      startD=addDays(weekRange(impWk,year).start, -(MSMAP.IMP?.offset??76));   // so IMP lands in impWk
      koWeek=Math.max(1,isoWeek(startD));
      campaign++;
    } else {
      startD=addDays(weekRange(koWeek,year).start,(i%3));
    }
    const milestones=MILESTONES.map(m=>{
      const ps=addDays(startD,m.offset), pe=addDays(startD,m.offset+m.dur);
      return {key:m.key, plannedStart:localISO(ps), plannedEnd:localISO(pe), actualStart:null, actualEnd:null, status:"Upcoming", owner};
    });
    // realistic progress front: complete milestones already in the past; leave ~22% with one overdue (genuine Delayed); a few run ahead
    const pastCount=milestones.filter(m=>parseDate(m.plannedEnd)<t).length;
    const roll=(i*17)%100;
    let completeThrough=pastCount;
    if(roll<22 && pastCount>0) completeThrough=pastCount-1;                       // slipped → Delayed
    else if(roll>=90) completeThrough=Math.min(milestones.length,pastCount+1);    // ahead of plan
    milestones.forEach((m,mi)=>{ if(mi<completeThrough){ m.status="Completed"; m.actualStart=m.plannedStart; m.actualEnd=m.plannedEnd; } });
    const pStart=milestones[0].plannedStart, pEnd=milestones[milestones.length-1].plannedEnd;
    // stores
    const pool=byFmt[format]||stores;
    let storeIds;
    if(isCampaign){ storeIds=sharedHyper.slice(); }
    else { const want= type==="PROJECT"?Math.min(pool.length,8): type==="MRC"?6: type==="SSPOG"?5: type==="MINOR"?3:4;
      const off=(i*3)%Math.max(1,pool.length); storeIds=[]; for(let k=0;k<want;k++) storeIds.push(pool[(off+k)%pool.length].id); }
    const minutesPerStore=isCampaign?LOAD_BY_TYPE.PROJECT:LOAD_BY_TYPE[type];
    let approval = isCampaign?"Approved": i%9===0?"Pending Review": i%13===0?"Draft": i%23===0?"Rejected":"Approved";
    projects.push({
      id:"P-"+idn,
      code:`${year}WK${String(koWeek).padStart(2,"0")}-${isCampaign?"PROJECT":type}-${division}-${String(i+1).padStart(3,"0")}`,
      name:`${year}WK${String(koWeek).padStart(2,"0")}-${isCampaign?"PROJECT":type}-${dept.split(" ")[0].toUpperCase()}`,
      type:isCampaign?"PROJECT":type, division, department:dept, owner, format,
      storeIds, minutesPerStore,
      start:pStart, end:pEnd, approval, statusOverride:null,
      milestones, history:[{by:owner,role:"Project Owner",action:"Created plan",note:"",ts:localISO(addDays(startD,-10))+"T09:00"}]
    });
  }
  return projects;
}

  try{ CLOUD_SYNC.token=localStorage.getItem(CLOUD_TOKEN_KEY)||""; }catch(e){}
  return CLOUD_SYNC.token;
}
function cloudHeaders(){
  const h={"Content-Type":"application/json","Accept":"application/json"};
  const token=cloudToken(); if(token) h["X-State-Token"]=token;
  return h;
}
function cloudSnapshot(){
  return {settings:SETTINGS,milestones:MILESTONES,stores,projects};
}
function cloudValidateState(o){
  if(!o||typeof o!=="object") return "State must be an object.";
  if(!Array.isArray(o.milestones)) return "Milestones array is missing.";
  if(!Array.isArray(o.stores)) return "Stores array is missing.";
  if(!Array.isArray(o.projects)) return "Projects array is missing.";
  return "";
}
function loadState(){
  let raw=null;
  try{ raw=ONEPLAN_FRESH_BOOT ? null : localStorage.getItem(CLOUD_CACHE_KEY); }catch(e){}
  CLOUD_SYNC.localHadSavedState=Boolean(raw);
  if(raw){
    try{
      const o=JSON.parse(raw);
      SETTINGS=Object.assign(SETTINGS,o.settings||{});
      MILESTONES=normalizeMilestones(o.milestones||MILESTONES);
      rebuildMSMap();
      stores=Array.isArray(o.stores)?o.stores:[];
      projects=Array.isArray(o.projects)?o.projects:[];
      if(Array.isArray(stores)&&stores.length&&Array.isArray(projects)){
        invalidateLoadIndex();
        return;
      }
    }catch(e){ console.warn("Local OnePlan cache could not be loaded.",e); }
  }
  MILESTONES=DEFAULT_MILESTONES.map(m=>({...m}));

  rebuildSeed();
}
function rebuildSeed(){ rebuildMSMap(); stores=seedStores(); projects=seedProjects(stores); invalidateLoadIndex(); }
function saveLocalCache(snapshot){

  catch(e){
    console.error("OnePlan local cache save failed.",e);
    cloudSetStatus("error","Local cache full");
    return false;
  }
}
function saveState(options){

  saveLocalCache(snapshot);

    CLOUD_SYNC.dirty=true;

}
function cloudSetStatus(state,label){
  const pill=document.getElementById("cloudSyncPill");
  const text=document.getElementById("cloudSyncLabel");
  if(pill) pill.dataset.state=state||"local";
  if(text) text.textContent=label||"Local cache";

function cloudUpdateStatus(){
  if(!navigator.onLine){ cloudSetStatus("offline",CLOUD_SYNC.dirty?"Offline · pending":"Offline · cached"); return; }
  if(CLOUD_SYNC.conflict){ cloudSetStatus("conflict","Sync conflict"); return; }
  if(CLOUD_SYNC.error){ cloudSetStatus("error",CLOUD_SYNC.error); return; }
  if(CLOUD_SYNC.saving){ cloudSetStatus("saving","Saving…"); return; }
  if(!CLOUD_SYNC.ready){ cloudSetStatus("loading","Connecting…"); return; }
  if(CLOUD_SYNC.dirty){ cloudSetStatus("local","Pending sync"); return; }
  cloudSetStatus("synced","Cloud synced");
}
function cloudQueueSave(delay=900){
  if(!CLOUD_SYNC.ready || CLOUD_SYNC.applying){ cloudUpdateStatus(); return; }
  clearTimeout(CLOUD_SYNC.timer);
  CLOUD_SYNC.timer=setTimeout(()=>cloudPush(false),delay);
  cloudUpdateStatus();
}
async function cloudFetch(path,options={}){
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),15000);
  try{
    return await fetch(path,Object.assign({},options,{headers:Object.assign({},cloudHeaders(),options.headers||{}),cache:"no-store",signal:controller.signal}));
  }finally{ clearTimeout(timeout); }
}
function cloudApplyState(state,meta){
  const err=cloudValidateState(state); if(err) throw new Error(err);
  try{ localStorage.setItem(CLOUD_BEFORE_PULL_KEY,JSON.stringify(cloudSnapshot())); }catch(e){}
  CLOUD_SYNC.applying=true;
  try{
    SETTINGS=Object.assign(SETTINGS,state.settings||{});
    SETTINGS.storageProvider="server-json"; SETTINGS.dataPath="/api/state"; SETTINGS.dataFileName="oneplan-state.json"; SETTINGS.syncMode="auto";
    MILESTONES=normalizeMilestones(state.milestones||MILESTONES); rebuildMSMap();
    stores=state.stores; projects=state.projects;
    onePlanRepairData();
    saveLocalCache(cloudSnapshot());
    CLOUD_SYNC.revision=meta?.revision??CLOUD_SYNC.revision;
    CLOUD_SYNC.checksum=meta?.checksum||"";
    CLOUD_SYNC.savedAt=meta?.savedAt||"";
    CLOUD_SYNC.loadedAt=new Date().toISOString();
    CLOUD_SYNC.dirty=false; CLOUD_SYNC.conflict=false; CLOUD_SYNC.error="";
  }finally{ CLOUD_SYNC.applying=false; }
  if(document.getElementById("menu1")?.children.length){ renderAll(); }

}
async function cloudPull(options={}){
  const startup=Boolean(options.startup), force=Boolean(options.force);
  if(CLOUD_SYNC.dirty && !startup && !force && !confirm("Unsynced local changes will be replaced by the cloud version. Continue?")) return false;
  cloudSetStatus("loading","Loading cloud…");
  try{
    const res=await cloudFetch(CLOUD_SYNC.endpoint,{method:"GET"});
    if(res.status===401){ CLOUD_SYNC.error="Token required"; CLOUD_SYNC.ready=true; cloudUpdateStatus(); return false; }
    if(!res.ok) throw new Error("Cloud load failed ("+res.status+")");
    const payload=await res.json();
    CLOUD_SYNC.ready=true;
    if(!payload.exists || !payload.state){
      CLOUD_SYNC.revision=payload.meta?.revision??0;
      CLOUD_SYNC.dirty=true;
      await cloudPush(true);
      return true;
    }
    cloudApplyState(payload.state,payload.meta||{});
    return true;
  }catch(e){
    CLOUD_SYNC.ready=true;
    CLOUD_SYNC.error=e.name==="AbortError"?"Cloud timeout":"Cloud unavailable";
    console.warn("Cloud state load failed; using local cache.",e);
    cloudUpdateStatus();
    return false;
  }
}
async function cloudPush(force=false){
  clearTimeout(CLOUD_SYNC.timer);
  if(CLOUD_SYNC.saving){ CLOUD_SYNC.pendingAfterSave=true; return false; }
  if(!navigator.onLine){ CLOUD_SYNC.dirty=true; cloudUpdateStatus(); return false; }
  CLOUD_SYNC.saving=true; CLOUD_SYNC.error=""; cloudUpdateStatus();
  const body={
    schemaVersion:2,
    state:cloudSnapshot(),
    baseRevision:CLOUD_SYNC.revision,
    force:Boolean(force),
    clientId:cloudClientId(),
    savedBy:(typeof role!=="undefined"?role:"OnePlan user")
  };
  try{
    const res=await cloudFetch(CLOUD_SYNC.endpoint,{method:"PUT",body:JSON.stringify(body)});
    const payload=await res.json().catch(()=>({}));
    if(res.status===409){
      CLOUD_SYNC.conflict=true; CLOUD_SYNC.dirty=true;
      CLOUD_SYNC.revision=payload.currentMeta?.revision??CLOUD_SYNC.revision;
      cloudUpdateStatus();
      return false;
    }
    if(res.status===401){ CLOUD_SYNC.error="Token required"; CLOUD_SYNC.dirty=true; cloudUpdateStatus(); return false; }
    if(!res.ok) throw new Error(payload.error||("Cloud save failed ("+res.status+")"));
    CLOUD_SYNC.revision=payload.meta?.revision??CLOUD_SYNC.revision;
    CLOUD_SYNC.checksum=payload.meta?.checksum||"";
    CLOUD_SYNC.savedAt=payload.meta?.savedAt||new Date().toISOString();
    CLOUD_SYNC.loadedAt=new Date().toISOString();
    CLOUD_SYNC.dirty=false; CLOUD_SYNC.conflict=false; CLOUD_SYNC.error="";
    return true;
  }catch(e){
    CLOUD_SYNC.error=e.name==="AbortError"?"Save timeout":"Save failed";
    CLOUD_SYNC.dirty=true; console.error(e); return false;
  }finally{
    CLOUD_SYNC.saving=false; cloudUpdateStatus();
    if(CLOUD_SYNC.pendingAfterSave){ CLOUD_SYNC.pendingAfterSave=false; cloudQueueSave(250); }
    if(activePage&&document.querySelector(".page.active")?.id==="settings") renderPage("settings");
  }
}
async function cloudCheckLatest(){
  if(!CLOUD_SYNC.ready || !navigator.onLine || CLOUD_SYNC.saving) return;

    const res=await cloudFetch(CLOUD_SYNC.endpoint+"/meta",{method:"GET"});
    if(!res.ok) return;
    const p=await res.json(); const remote=p.meta?.revision??0;
    if(remote && CLOUD_SYNC.revision!=null && remote!==CLOUD_SYNC.revision){
      if(CLOUD_SYNC.dirty){ CLOUD_SYNC.conflict=true; cloudUpdateStatus(); }
      else await cloudPull({force:true});
    }else if(CLOUD_SYNC.dirty) cloudQueueSave(100);
  }catch(e){}
}

/* ---------- 6. DERIVED STATUS ENGINE (the missing logic) ---------- */
// milestone derived state from dates vs real today (unless explicitly Completed)
function msState(m){
  const t=today();
  if(m.status==="Completed") return "Completed";
  const ps=parseDate(m.plannedStart), pe=parseDate(m.plannedEnd);
  if(t>pe) return "Delayed";                 // past due, not done
  if(t<ps) return "Upcoming";
  // in window
  if(daysBetween(t,pe) <= (MSMAP[m.key]?.warn??2)) return "AtRisk";
  return "InProgress";
}
function projState(p){
  if(p.statusOverride) return p.statusOverride;            // e.g. Cancelled / manual
  const states=p.milestones.map(msState);
  if(states.every(s=>s==="Completed")) return "Completed";
  if(states.some(s=>s==="Delayed")) return "Delayed";
  if(states.some(s=>s==="AtRisk")) return "AtRisk";
  return "OnTrack";
}
function projPercent(p){ const done=p.milestones.filter(m=>m.status==="Completed").length; return Math.round(done/p.milestones.length*100); }
function isOverdue(p){ return p.statusOverride!=="Cancelled" && p.milestones.some(m=>m.status!=="Completed" && parseDate(m.plannedEnd)<today()); }

/* ---------- 7. CAPACITY ENGINE (derived from plans, not hardcoded) ---------- */
// load a store receives in a given ISO week = sum minutesPerStore of projects whose
// IMP milestone overlaps that week AND that apply to the store.
let LOAD_INDEX=null;
function invalidateLoadIndex(){ LOAD_INDEX=null; }
function loadIndexKey(wkNum,year){ return `${year}-WK${String(wkNum).padStart(2,"0")}`; }
function buildLoadIndex(){
  if(LOAD_INDEX) return LOAD_INDEX;
  const index=new Map();
  projects.forEach(p=>{
    if(p.statusOverride==="Cancelled") return;
    const imp=(p.milestones||[]).find(m=>m.key==="IMP");
    if(!imp||!imp.plannedStart||!imp.plannedEnd) return;
    let cursor=mondayOfWeek(parseDate(imp.plannedStart));
    const last=mondayOfWeek(parseDate(imp.plannedEnd));
    const storeIds=Array.isArray(p.storeIds)?p.storeIds:[];
    while(cursor<=last){
      const key=loadIndexKey(isoWeek(cursor),isoWeekYear(cursor));
      let weekMap=index.get(key);
      if(!weekMap){ weekMap=new Map(); index.set(key,weekMap); }
      storeIds.forEach(storeId=>{
        let row=weekMap.get(storeId);
        if(!row){ row={planned:0,booked:0,actual:0,projects:[]}; weekMap.set(storeId,row); }
        const mins=Number(p.minutesPerStore)||0;
        row.planned+=mins;
        if(p.approval==="Approved") row.booked+=mins;
        if(imp.status==="Completed") row.actual+=mins;
        row.projects.push(p);
      });
      cursor=addDays(cursor,7);
    }
  });
  LOAD_INDEX=index;
  return index;
}
function storeWeekLoad(storeId, wkNum, year){
  const weekMap=buildLoadIndex().get(loadIndexKey(wkNum,year));
  return weekMap?.get(storeId) || {planned:0,booked:0,actual:0,projects:[]};
}
function storeStatusFromUtil(u){ if(u>SETTINGS.capacityBlock) return "Over"; if(u>=SETTINGS.capacityWarn) return "Watch"; return "Available"; }
// utilization of a store for a focus week
function storeUtil(store, wkNum, year){
  const l=storeWeekLoad(store.id, wkNum, year);
  const u=store.capacity? Math.round(l.planned/store.capacity*100):0;
  return {util:u, status:storeStatusFromUtil(u), load:l};
}
// trend across weeks for a format: budget=capacity sum, booking=approved load, actual=completed load
function capacityTrend(format, fromWk, toWk, year){
  const rows=[];
  const formats=Array.isArray(format)?format:(format==="All"||!format?[]:[format]);
  const fmtStores=stores.filter(s=>!formats.length||formats.includes(s.format));
  for(let w=fromWk; w<=toWk; w++){
    let budget=0,booking=0,actual=0;
    fmtStores.forEach(s=>{ const l=storeWeekLoad(s.id,w,year); budget+=s.capacity; booking+=l.booked; actual+=l.actual; });
    rows.push({wk:"WK"+String(w).padStart(2,"0"),budget,booking,actual});
  }
  return rows;
}
// impact of a single project across its IMP week (for the rule engine at save/approve)
function projectCapacityImpact(p){
  const imp=p.milestones.find(m=>m.key==="IMP"); if(!imp||!imp.plannedStart) return {max:0,overloaded:[],week:"—"};
  const wk=isoWeek(parseDate(imp.plannedStart)); const yr=isoWeekYear(parseDate(imp.plannedStart));
  let max=0; const overloaded=[];
  p.storeIds.forEach(id=>{
    const st=stores.find(s=>s.id===id); if(!st) return;
    const l=storeWeekLoad(id,wk,yr); // includes this project if already saved; if new, add
    let planned=l.planned; if(!projects.find(x=>x.id===p.id)) planned+=p.minutesPerStore;
    const u=Math.round(planned/st.capacity*100);
    if(u>max) max=u;
    if(u>SETTINGS.capacityBlock) overloaded.push({store:st,util:u});
  });
  return {max, overloaded, week:"WK"+String(wk).padStart(2,"0")};
}
// conflict: same format + same IMP week with multiple high-impact (PROJECT/SSPOG) plans
function detectConflicts(){
  const map={};
  projects.forEach(p=>{
    if(p.statusOverride==="Cancelled") return;
    const imp=p.milestones.find(m=>m.key==="IMP"); if(!imp) return;
    const wk=weekKeyOf(parseDate(imp.plannedStart));
    const k=p.format+"|"+wk; (map[k]=map[k]||[]).push(p);
  });
  return Object.entries(map).filter(([k,arr])=> arr.filter(p=>["PROJECT","SSPOG"].includes(p.type)).length>=2)
    .map(([k,arr])=>({format:k.split("|")[0],week:k.split("|")[1],projects:arr}));
}

/* ---------- 9. SHARED FILTER CONTEXT (syncs across modules) ---------- */
const MULTI_FILTER_FIELDS=new Set(["division","department","type","status","owner","milestone","milestoneStatus","format","zone","storeNo","capacityStatus"]);
let F={ division:[], department:[], type:[], status:[], owner:[],
        milestone:[], milestoneStatus:[], month:"All", week:"All", date:"",
        format:[], zone:[], storeNo:[], capacityStatus:[], q:"" };
let viewMode=localStorage.getItem("onePlanV2View")||"week";
let ganttZoom=Number(localStorage.getItem("onePlanV2Zoom"))||1;     // timeline zoom multiplier
let trendSpan=Number(localStorage.getItem("onePlanV2Trend"))||10;   // capacity-trend visible weeks
let plansPage=1, plansSort={col:"code",dir:1}, storeCapacityPage=1, storeCapacityPageSize=50;

function filterValues(field){
  const v=F[field];
  if(Array.isArray(v)) return [...new Set(v.filter(x=>x!==undefined&&x!==null&&String(x)!==""&&String(x)!=="All").map(String))];
  return v===undefined||v===null||v===""||v==="All"?[]:[String(v)];
}
function filterIsAll(field){ return filterValues(field).length===0; }
function filterHas(field,value){ const vals=filterValues(field); return !vals.length||vals.includes(String(value)); }
function setFilterValues(field,values){ F[field]=[...new Set((values||[]).filter(Boolean).map(String))]; }
function filterLabel(field,value){
  if(field==="status") return statusText(value);
  if(field==="milestoneStatus") return ({InProgress:"In Progress",AtRisk:"At Risk"}[value]||value);
  return String(value);
}
function hasPeriod(){ return F.month!=="All"||F.week!=="All"||!!F.date; }
function periodWindow(){ // returns {start,end} of active period filter or null
  const y=SETTINGS.planYear;
  if(F.date){ const s=parseDate(F.date); return {start:s,end:s}; }
  if(F.week!=="All"){ const w=Number(F.week.replace("WK","")); return weekRange(w,y); }
  if(F.month!=="All"){ const m=Number(F.month)-1; return {start:new Date(y,m,1),end:new Date(y,m+1,0)}; }
  return null;
}
function projInPeriod(p){
  if(!hasPeriod()) return true;
  const win=periodWindow(); if(!win) return true;
  const selectedMilestones=filterValues("milestone");
  const ranges = selectedMilestones.length
    ? p.milestones.filter(m=>selectedMilestones.includes(m.key)).map(m=>({s:parseDate(m.plannedStart),e:parseDate(m.plannedEnd)}))
    : p.milestones.map(m=>({s:parseDate(m.plannedStart),e:parseDate(m.plannedEnd)}));
  return ranges.some(r=>rangeOverlaps(r.s,r.e,win.start,win.end));
}
function msMatch(p){
  const keys=filterValues("milestone"), statuses=filterValues("milestoneStatus");
  if(!keys.length&&!statuses.length) return true;
  const candidates=keys.length?p.milestones.filter(m=>keys.includes(m.key)):p.milestones;
  if(!candidates.length) return false;
  return !statuses.length||candidates.some(m=>statuses.includes(msState(m)));
}
function matchProject(p){
  const st=projState(p);
  return filterHas("division",p.division)&&
    filterHas("department",p.department)&&
    filterHas("type",p.type)&&
    filterHas("status",st)&&
    filterHas("owner",p.owner)&&
    filterHas("format",p.format)&&
    msMatch(p)&&projInPeriod(p)&&
    (!F.q||[p.code,p.name,p.owner,p.division,p.department,p.type].join(" ").toLowerCase().includes(F.q.toLowerCase()));
}
function filteredProjects(){ return projects.filter(matchProject); }
function activeFilterChips(){
  const chips=[];
  const addMulti=(prefix,key)=>filterValues(key).forEach(v=>chips.push({label:prefix+filterLabel(key,v),key,val:v}));
  addMulti("Division: ","division");
  addMulti("Dept: ","department");
  addMulti("Type: ","type");
  addMulti("Status: ","status");
  addMulti("Owner: ","owner");
  addMulti("Format: ","format");
  addMulti("Zone: ","zone");
  addMulti("Store No: ","storeNo");
  addMulti("Milestone: ","milestone");
  addMulti("MS Status: ","milestoneStatus");
  addMulti("Capacity: ","capacityStatus");
  if(F.month!=="All")chips.push({label:"Month: "+monthName(F.month),key:"month"});
  if(F.week!=="All")chips.push({label:"Week: "+F.week,key:"week"});
  if(F.date)chips.push({label:"Date: "+F.date,key:"date"});
  if(F.q)chips.push({label:'Search: "'+F.q+'"',key:"q"});
  return chips;
}
function clearChip(key,encodedValue){
  if(MULTI_FILTER_FIELDS.has(key)){
    const value=encodedValue?decodeURIComponent(encodedValue):"";
    setFilterValues(key,value?filterValues(key).filter(v=>v!==value):[]);
  }else F[key]=key==="date"||key==="q"?"":"All";
  if(key==="q")document.getElementById("globalSearch").value="";
  plansPage=1; storeCapacityPage=1; renderAll();
}
function resetFilters(){
  F={division:[],department:[],type:[],status:[],owner:[],milestone:[],milestoneStatus:[],month:"All",week:"All",date:"",format:[],zone:[],storeNo:[],capacityStatus:[],q:""};
  document.getElementById("globalSearch").value=""; plansPage=1; storeCapacityPage=1; renderAll();
}

/* ---------- 10. small helpers ---------- */
function statusText(s){return {OnTrack:"On Track",AtRisk:"At Risk",Delayed:"Delayed",Completed:"Completed",Cancelled:"Cancelled"}[s]||s;}
function statusColor(s){return {OnTrack:"var(--green)",AtRisk:"var(--amber)",Delayed:"var(--red)",Completed:"var(--blue)",Cancelled:"var(--slate)"}[s]||"var(--slate)";}
function apvColor(a){return {Approved:"#0c7d4d","Pending Review":"#6d54e6",Draft:"#8696a8",Rejected:"#b81f1f","Need Revision":"#9a5e00"}[a]||"#5f7184";}
function apvTag(a){return `<span class="apv" style="color:${apvColor(a)}">${a}</span>`;}
function pill(s){return `<span class="pill st-${s}">${statusText(s)}</span>`;}
function monthName(m){return ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][Number(m)];}
function uniq(field){return ["All",...Array.from(new Set(projects.map(p=>p[field]).filter(Boolean))).sort()];}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function liveDate(p){
  const imp=(p.milestones||[]).find(m=>m.key==="IMP"&&m.plannedStart);
  return imp ? parseDate(imp.plannedStart) : parseDate(p.end||p.start);
}
function liveWeekLabel(p){
  const ld=liveDate(p);
  return `${SETTINGS.planYear}WK${String(isoWeek(ld)).padStart(2,"0")}`;
}
function sortByLiveWeek(list){
  return [...list].sort((a,b)=>{
    const da=liveDate(a), db=liveDate(b);
    return da-db || String(a.type).localeCompare(String(b.type)) || String(a.department).localeCompare(String(b.department)) || String(a.code).localeCompare(String(b.code));
  });
}
function normalizeProjectPart(v){
  return String(v||"").trim().toUpperCase().replace(/&/g,"AND").replace(/[^A-Z0-9]+/g,"_").replace(/^_+|_+$/g,"") || "TBC";
}
function nextProjectCode(base,id){
  const used=new Set(projects.filter(p=>p.id!==id).map(p=>p.code));
  if(!used.has(base)) return base;
  let n=2;
  while(used.has(`${base}-${String(n).padStart(2,"0")}`)) n++;
  return `${base}-${String(n).padStart(2,"0")}`;
}
function buildProjectCodeFromForm(id=""){
  const type=document.getElementById("fType")?.value || "";
  const dept=document.getElementById("fDepartment")?.value || "";
  const impDate=document.querySelector('.ms-s[data-k="IMP"]')?.value || "";
  if(!type || !dept || !impDate) return "";
  const d=parseDate(impDate);
  const base=`${SETTINGS.planYear}WK${String(isoWeek(d)).padStart(2,"0")}-${normalizeProjectPart(type)}-${normalizeProjectPart(dept)}`;
  return nextProjectCode(base,id);
}
function updateProjectNameFromFields(){
  const codeEl=document.getElementById("fCode");
  const nameEl=document.getElementById("fName");
  if(!codeEl||!nameEl) return;
  const code=buildProjectCodeFromForm(document.getElementById("fId")?.value||"");
  codeEl.value=code;
  nameEl.value=code;
}

  ["gantt","▦","Gantt Chart","Plan Control"],

  const groups={ "Plan Control":"menu1","Execution":"menu2","System":"menu3" };
  Object.values(groups).forEach(id=>document.getElementById(id).innerHTML="");
  NAV.forEach(([page,ico,label,grp])=>{

    b.innerHTML=`<span class="ico">${ico}</span><span>${label}</span><span class="pill" id="badge-${page}" style="display:none"></span>`;

function navigate(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  document.querySelectorAll(".menu button").forEach(b=>b.classList.toggle("active",b.dataset.page===page));
  document.getElementById("pgTitle").innerText=CRUMB[page][0];
  document.getElementById("pgCrumb").innerText=CRUMB[page][1];
  renderPage(page);
  document.getElementById("content").scrollTop=0;

/* ---------- 12. FILTER TOOLBAR ---------- */
const MULTI_FILTER_RENDER_LIMIT=180;
let multiFilterCatalog={}, multiFilterDraft={};
function normalizedFilterOptions(options){
  const seen=new Set();
  return (options||[]).map(o=>typeof o==="object"?{value:String(o.value),text:String(o.text)}:{value:String(o),text:String(o)})
    .filter(o=>o.value!=="All"&&!seen.has(o.value)&&(seen.add(o.value),true));
}
function multiFilterSummary(field,options){
  const vals=filterValues(field); if(!vals.length) return "All";
  const map=Object.fromEntries(options.map(o=>[o.value,o.text]));
  if(vals.length===1) return map[vals[0]]||filterLabel(field,vals[0]);
  return `${vals.length} selected`;
}
function multiOptionsMarkup(field,query=""){
  const options=multiFilterCatalog[field]||[];
  const draft=new Set(multiFilterDraft[field]??filterValues(field));
  const q=String(query||"").trim().toLowerCase();
  const matches=options.filter(o=>!q||`${o.text} ${o.value}`.toLowerCase().includes(q));
  const selected=options.filter(o=>draft.has(o.value)&&(!q||`${o.text} ${o.value}`.toLowerCase().includes(q)));
  const selectedSet=new Set(selected.map(o=>o.value));
  const list=[...selected,...matches.filter(o=>!selectedSet.has(o.value))].slice(0,MULTI_FILTER_RENDER_LIMIT);
  if(!list.length) return `<div class="multi-empty">No matching option</div>`;
  return list.map(o=>`<label class="multi-option" title="${esc(o.text)}"><input type="checkbox" value="${esc(o.value)}" ${draft.has(o.value)?"checked":""} onchange="toggleMultiDraft('${field}',this.value,this.checked)"><span>${esc(o.text)}</span></label>`).join("")+
    (matches.length>MULTI_FILTER_RENDER_LIMIT?`<div class="multi-limit">Showing ${MULTI_FILTER_RENDER_LIMIT.toLocaleString()} of ${matches.length.toLocaleString()} matches. Refine your search.</div>`:"");
}
function multiFilterControl(label,field,options){
  const normalized=normalizedFilterOptions(options); multiFilterCatalog[field]=normalized;
  multiFilterDraft[field]=filterValues(field);
  return `<div class="fld"><label>${label}</label><div class="multi-select" data-field="${field}" onclick="event.stopPropagation()">
    <button type="button" class="multi-trigger" onclick="openMultiFilter(event,'${field}')" aria-haspopup="listbox" aria-expanded="false"><span class="multi-value">${esc(multiFilterSummary(field,normalized))}</span><span class="multi-caret">▼</span></button>
    <div class="multi-menu" onclick="event.stopPropagation()">
      <input class="multi-search" type="search" placeholder="Search ${esc(label)}..." oninput="filterMultiOptions('${field}',this.value)">
      <div class="multi-actions"><button type="button" onclick="selectVisibleMulti('${field}')">Select search results</button><button type="button" onclick="clearMultiDraft('${field}')">Clear</button></div>
      <div class="multi-options">${multiOptionsMarkup(field)}</div>
      <div class="multi-footer"><button type="button" class="btn sm" onclick="cancelMultiFilter('${field}')">Cancel</button><button type="button" class="btn sm primary" onclick="applyMultiFilter('${field}')">Apply</button></div>
    </div></div></div>`;
}
function closeMultiFilters(except=""){
  document.querySelectorAll(".multi-select.open").forEach(el=>{if(el.dataset.field!==except){el.classList.remove("open");el.querySelector(".multi-trigger")?.setAttribute("aria-expanded","false");}});
}
function openMultiFilter(evt,field){
  evt.preventDefault(); evt.stopPropagation();
  const wrap=document.querySelector(`.multi-select[data-field="${field}"]`); if(!wrap)return;
  const willOpen=!wrap.classList.contains("open"); closeMultiFilters(field);
  if(willOpen){multiFilterDraft[field]=filterValues(field);wrap.classList.add("open");wrap.querySelector(".multi-trigger")?.setAttribute("aria-expanded","true");const q=wrap.querySelector(".multi-search");if(q){q.value="";renderMultiFilterOptions(field,"");setTimeout(()=>q.focus(),0);}}
  else closeMultiFilters();
}
function renderMultiFilterOptions(field,query=""){
  const wrap=document.querySelector(`.multi-select[data-field="${field}"]`); const box=wrap?.querySelector(".multi-options"); if(box)box.innerHTML=multiOptionsMarkup(field,query);
}
function filterMultiOptions(field,query){renderMultiFilterOptions(field,query);}
function toggleMultiDraft(field,value,checked){
  const set=new Set(multiFilterDraft[field]??filterValues(field)); checked?set.add(String(value)):set.delete(String(value)); multiFilterDraft[field]=[...set];
}
function selectVisibleMulti(field){
  const wrap=document.querySelector(`.multi-select[data-field="${field}"]`); const q=wrap?.querySelector(".multi-search")?.value.trim().toLowerCase()||"";
  const matches=(multiFilterCatalog[field]||[]).filter(o=>!q||`${o.text} ${o.value}`.toLowerCase().includes(q));
  const set=new Set(multiFilterDraft[field]??filterValues(field)); matches.forEach(o=>set.add(o.value)); multiFilterDraft[field]=[...set]; renderMultiFilterOptions(field,q);
}
function clearMultiDraft(field){multiFilterDraft[field]=[];const wrap=document.querySelector(`.multi-select[data-field="${field}"]`);renderMultiFilterOptions(field,wrap?.querySelector(".multi-search")?.value||"");}
function cancelMultiFilter(field){multiFilterDraft[field]=filterValues(field);closeMultiFilters();}
function applyMultiFilter(field){
  setFilterValues(field,multiFilterDraft[field]||[]);
  if(field==="format"){
    const valid=new Set(stores.filter(s=>filterHas("format",s.format)).map(s=>s.no));
    setFilterValues("storeNo",filterValues("storeNo").filter(no=>valid.has(no)));
  }
  plansPage=1;storeCapacityPage=1;closeMultiFilters();renderAll();
}
document.addEventListener("click",()=>closeMultiFilters());
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeMultiFilters();});

function toolbar(opts={}){
  const mk=(label,field,options)=>`<div class="fld"><label>${label}</label><select onchange="F.${field}=this.value;plansPage=1;storeCapacityPage=1;renderAll()">${
    options.map(o=>{const v=typeof o==="object"?o.value:o;const t=typeof o==="object"?o.text:o;return `<option value="${v}" ${F[field]===v?"selected":""}>${t}</option>`;}).join("")}</select></div>`;
  const months=[{value:"All",text:"All"},...Array.from({length:12},(_,i)=>({value:String(i+1),text:monthName(i+1)}))];
  const weeks=["All",...Array.from({length:isoWeeksInYear(SETTINGS.planYear)},(_,i)=>"WK"+String(i+1).padStart(2,"0"))];
  let html=`<div class="toolbar">`;
  if(opts.project!==false){
    html+=multiFilterControl("Division","division",uniq("division"))+multiFilterControl("Department","department",uniq("department"))+
      multiFilterControl("Type","type",TYPES.length?TYPES:uniq("type"))+
      multiFilterControl("Status","status",[{value:"OnTrack",text:"On Track"},{value:"AtRisk",text:"At Risk"},{value:"Delayed",text:"Delayed"},{value:"Completed",text:"Completed"},{value:"Cancelled",text:"Cancelled"}])+
      multiFilterControl("Owner","owner",uniq("owner"))+multiFilterControl("Format","format",FORMATS)+
      multiFilterControl("Key Milestone","milestone",MILESTONES.map(m=>({value:m.key,text:`${m.key} — ${m.full}`})))+
      multiFilterControl("MS Status","milestoneStatus",[{value:"Upcoming",text:"Upcoming"},{value:"InProgress",text:"In Progress"},{value:"Completed",text:"Completed"},{value:"AtRisk",text:"At Risk"},{value:"Delayed",text:"Delayed"}]);
  }
  if(opts.store){
    const noList=stores.filter(s=>filterHas("format",s.format)).map(s=>({value:s.no,text:`${s.no} — ${s.name}`}));
    html+=multiFilterControl("Store Format","format",FORMATS)+multiFilterControl("Store No.","storeNo",noList)+multiFilterControl("Zone","zone",ZONES)+
      multiFilterControl("Capacity Status","capacityStatus",["Available","Watch","Over"]);
  }
  html+=mk("Month","month",months)+mk("Week","week",weeks)+
    `<div class="fld"><label>Date</label><input type="date" value="${F.date}" onchange="F.date=this.value;renderAll()"></div>`;
  if(opts.view!==false){
    html+=`<div class="spacer"></div><div class="fld"><label>View</label><div class="segmented">
      <button class="${viewMode==="month"?"active":""}" onclick="setView('month')">Month</button>
      <button class="${viewMode==="week"?"active":""}" onclick="setView('week')">Week</button>
      <button class="${viewMode==="day"?"active":""}" onclick="setView('day')">Day</button></div></div>
      <div class="fld"><label>Zoom</label><div class="segmented">
      <button onclick="zoomGantt(-0.2)" title="Zoom out" ${ganttZoom<=0.5?"disabled":""}>−</button>
      <button onclick="zoomGantt(0)" style="min-width:54px;cursor:default" title="Reset zoom">${Math.round(ganttZoom*100)}%</button>
      <button onclick="zoomGantt(0.2)" title="Zoom in" ${ganttZoom>=2.5?"disabled":""}>+</button></div></div>`;
  }
  html+=`<button class="btn" onclick="resetFilters()">Reset</button></div>`;
  const chips=activeFilterChips();
  if(chips.length) html+=`<div class="chips">`+chips.map(c=>`<span class="chip-f">${esc(c.label)}<button onclick="clearChip('${c.key}','${c.val!==undefined?encodeURIComponent(String(c.val)):""}')">×</button></span>`).join("")+`<button class="btn sm" onclick="resetFilters()">Clear all</button></div>`;
  return html;
}
function setView(m){ viewMode=m; localStorage.setItem("onePlanV2View",m); renderAll(); }
function zoomGantt(d){ if(d===0){ ganttZoom=1; } else { ganttZoom=Math.max(0.5,Math.min(2.5,Math.round((ganttZoom+d)*10)/10)); } localStorage.setItem("onePlanV2Zoom",ganttZoom); renderAll(); }
