/* ---------- 13. GANTT ---------- */
function ganttRange(){
  const win=periodWindow();
  let min,max;
  if(win){ min=new Date(win.start); max=new Date(win.end); }
  else if(viewMode==="day"){
    // Day view must be a real daily calendar window, not a compressed full-year canvas.
    // Default daily view focuses the current ISO week (Monday-Sunday).
    min=mondayOfWeek(today());
    max=addDays(min,6);
  }
  else{
    const list=filteredProjects(); const src=list.length?list:projects;
    const ds=src.flatMap(p=>p.milestones.filter(m=>m.plannedStart&&m.plannedEnd).flatMap(m=>[parseDate(m.plannedStart),parseDate(m.plannedEnd)]));
    ds.push(today());
    min=new Date(Math.min(...ds)); max=new Date(Math.max(...ds));
    min=addDays(min,-3); max=addDays(max,7);
  }
  if(viewMode==="day"){ min=mondayOfWeek(min); max=addDays(mondayOfWeek(max),6); }
  else if(viewMode==="week"){ min=mondayOfWeek(min); max=addDays(mondayOfWeek(max),6); }
  else { min=new Date(min.getFullYear(),min.getMonth(),1); max=new Date(max.getFullYear(),max.getMonth()+1,0); }
  return {min,max};
}
function colW(){ return Math.round((viewMode==="day"?46:viewMode==="week"?120:200)*ganttZoom); }
function pxPerDay(){ const w=colW(); return viewMode==="day"?w:viewMode==="week"?w/7:w/30.4; }
function offX(date,min){ return (startOfDay(date)-startOfDay(min))/86400000*pxPerDay(); }
function ganttCols(min,max){
  const cols=[];
  if(viewMode==="day"){ for(let x=new Date(min);x<=max;x=addDays(x,1)) cols.push({s:new Date(x),label:String(x.getDate()).padStart(2,"0"),sub:["Su","Mo","Tu","We","Th","Fr","Sa"][x.getDay()],wknd:[0,6].includes(x.getDay()),month:x.toLocaleString("en-US",{month:"short"})+" "+x.getFullYear()}); }
  else if(viewMode==="week"){ for(let x=mondayOfWeek(min);x<=max;x=addDays(x,7)) cols.push({s:new Date(x),label:"WK"+String(isoWeek(x)).padStart(2,"0"),sub:fmtShort(x),month:x.toLocaleString("en-US",{month:"long"})+" "+isoWeekYear(x)}); }
  else { for(let x=new Date(min.getFullYear(),min.getMonth(),1);x<=max;x=new Date(x.getFullYear(),x.getMonth()+1,1)) cols.push({s:new Date(x),label:x.toLocaleString("en-US",{month:"short"}).toUpperCase(),sub:"",month:String(x.getFullYear())}); }
  return cols;
}
function renderGantt(){
  const {min,max}=ganttRange();
  const visibleWindow={start:min,end:max};
  const baseProjects=filteredProjects();
  const all=sortByLiveWeek(viewMode==="day"
    ? baseProjects.filter(p=>(p.milestones||[]).some(m=>m.plannedStart&&m.plannedEnd&&rangeOverlaps(parseDate(m.plannedStart),parseDate(m.plannedEnd),visibleWindow.start,visibleWindow.end)))
    : baseProjects);
  const cols=ganttCols(min,max); const cw=colW(); const totalW=cols.length*cw;
  const todayX=Math.max(0,Math.min(totalW,offX(today(),min)));
  const monthSpans=[]; cols.forEach(c=>{const last=monthSpans[monthSpans.length-1]; if(last&&last.m===c.month)last.n++;else monthSpans.push({m:c.month,n:1});});

  function barFor(p){
    const vis=p.milestones.filter(m=>{
      if(!m.plannedStart||!m.plannedEnd) return false;
      const keyOk=filterHas("milestone",m.key);
      const stOk=filterHas("milestoneStatus",msState(m));
      const visibleOk=rangeOverlaps(parseDate(m.plannedStart),parseDate(m.plannedEnd),visibleWindow.start,visibleWindow.end);
      const perOk=!hasPeriod()|| (()=>{const w=periodWindow();return rangeOverlaps(parseDate(m.plannedStart),parseDate(m.plannedEnd),w.start,w.end);})();
      return keyOk&&stOk&&perOk&&visibleOk;
    });
    const pStart=parseDate(p.start), pEnd=parseDate(p.end);
    const showSummary=rangeOverlaps(pStart,pEnd,visibleWindow.start,visibleWindow.end);
    const ps=Math.max(0,Math.min(offX(pStart,min),totalW));
    const pe=Math.max(0,Math.min(offX(addDays(pEnd,1),min),totalW));
    const sumW=Math.max(0,pe-ps);
    const pct=projPercent(p);
    let bars=showSummary&&sumW>0?`<div class="gsummary" style="left:${ps}px;width:${Math.max(6,sumW)}px"><i style="width:${pct}%"></i></div>`:"";
    bars+=vis.map((m,i)=>{
      const st=msState(m);
      const rawL=offX(parseDate(m.plannedStart),min);
      const rawR=offX(addDays(parseDate(m.plannedEnd),1),min);
      const l=Math.max(0,Math.min(rawL,totalW));
      const r=Math.max(0,Math.min(rawR,totalW));
      const w=Math.max(20,r-l);
      const y=14+ (i%3)*13;
      const cls=[`c-${m.key}`, st==="Completed"?"done":"", st==="Delayed"?"delay":st==="AtRisk"?"risk":"", filterValues("milestone").includes(m.key)?"sel":""].join(" ");
      const ck=st==="Completed"?`<span class="ck">✓</span>`:"";
      return `<button type="button" class="ms ${cls}" style="left:${l}px;width:${w}px;top:${y}px" title="View milestone details · ${m.key} · ${MSMAP[m.key]?.full||""}\n${m.plannedStart} → ${m.plannedEnd}\nStatus: ${statusText(st)}" onclick="openGanttMilestoneDetails('${p.id}','${m.key}')" aria-label="View ${m.key} milestone details">${m.key}${ck}</button>`;
    }).join("");
    const st=projState(p);
    return `<div class="grow"><div class="gcell-left">
        <button class="project-link pname" title="Open Detail Plan · ${esc(p.name)}" onclick="openDetailPlan('${p.id}')">${esc(p.name)}</button>
        <div class="powner">${liveWeekLabel(p)} · ${esc(p.owner)} · ${p.division}/${p.format}</div>
        ${pill(st)}
      </div><div class="gtl"><div class="gbarwrap">
        ${bars}
      </div></div></div>`;
  }

  const rowsHtml=all.map(barFor).join("");

  const head=`<div class="grow head"><div class="gcell-left">Project / Milestone</div><div class="gtime">
    <div class="gmonths">${monthSpans.map(s=>`<div class="gmonth" style="width:${s.n*cw}px">${s.m}</div>`).join("")}</div>
    <div class="gcols">${cols.map(c=>`<div class="gcol ${c.wknd?"wknd":""}" style="width:${cw}px">${c.label}<span class="wd">${c.sub}</span></div>`).join("")}</div>
    <div class="today-pin" style="left:${todayX}px" title="Today · ${fmtDisp(today())}"><span>TODAY</span></div>
  </div></div>`;

  return `${toolbar({})}
  <div class="gantt-shell">
    <div class="gantt-top">
      <div><h3>Key Milestone Timeline</h3>
        <div class="small">Today: ${fmtDisp(today())} · ${weekKeyOf(today())} ${isoWeekYear(today())} · Showing ${all.length} project(s) · Sorted by Live Week${viewMode==="day"&&!hasPeriod()?" · Day view focuses current Mon-Sun week":""}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn ghost" onclick="goGanttToday()">Today</button>
        ${can("create")?`<button class="btn primary" onclick="openPlanModal()">+ Add Plan</button>`:""}
        <button class="btn ghost" onclick="navigate('storecapacity')">Store Capacity →</button></div>
    </div>
    <div class="gantt-scroll"><div class="gantt" style="width:${260+totalW}px">${head}${rowsHtml||`<div class="empty">No project matches the current filters.</div>`}</div></div>
  </div>
  <div class="card" style="margin-top:14px"><div class="section-title">Milestone Legend</div><div class="legend-row">
    ${MILESTONES.map(m=>`<div class="lg"><span class="sw" style="background:${milestoneColor(m.key)}"></span>${m.key} — ${m.full}</div>`).join("")}
  </div></div>`;
}

function openGanttMilestoneDetails(projectId,key){
  const p=projects.find(x=>x.id===projectId);
  const m=p?.milestones?.find(x=>x.key===key);
  if(!p||!m)return;
  normalizeMilestoneNextSteps(m);
  const master=MSMAP[m.key]||{full:m.key,dep:null};
  const state=msState(m);
  const start=m.plannedStart?parseDate(m.plannedStart):null;
  const end=m.plannedEnd?parseDate(m.plannedEnd):null;
  const duration=start&&end?Math.max(1,Math.round((end-start)/86400000)+1):0;
  const nextSteps=milestonePanelNextSteps(m);
  const modal=document.getElementById("genModal");
  const inner=document.getElementById("genModalInner");
  inner.innerHTML=`
    <div class="modal-head"><h2>${esc(m.key)} — ${esc(master.full||m.key)}</h2><button class="x" onclick="closeModal('genModal')">✕</button></div>

function inclusiveOverlapDays(aStart,aEnd,bStart,bEnd){
  const as=parseDate(aStart), ae=parseDate(aEnd);
  if(!Number.isFinite(as.getTime())||!Number.isFinite(ae.getTime())) return 0;
  const s=Math.max(as.getTime(),bStart.getTime());
  const e=Math.min(ae.getTime(),bEnd.getTime());
  return e<s?0:Math.floor((e-s)/86400000)+1;
}

let implementationLoadRenderToken=0;
function buildImplementationLoadBars(){
  const wk=isoWeek(today()), yr=isoWeekYear(today());
  const currentMonday=weekRange(wk,yr).start;
  const windowStart=addDays(currentMonday,-7);
  const buckets=Array.from({length:8},(_,i)=>{
    const start=addDays(windowStart,i*7), end=addDays(start,6);
    const teams=Object.fromEntries(TEAM_LOAD_CONFIG.map(t=>[t.key,{raw:0,activities:0}]));
    return {start,end,teams};
  });
  const windowEnd=buckets[buckets.length-1].end;

  for(const p of projects){
    if(p.statusOverride==="Cancelled") continue;
    const typeFactor=PROJECT_TEAM_LOAD_FACTOR[p.type]||1;
    const storeScale=1+Math.min(.65,Math.log10(Math.max(1,(p.storeIds||[]).length)+1)*.42);
    for(const m of (p.milestones||[])){
      if(!m.plannedStart||!m.plannedEnd) continue;
      const ms=parseDate(m.plannedStart), me=parseDate(m.plannedEnd);
      if(!Number.isFinite(ms.getTime())||!Number.isFinite(me.getTime())||me<windowStart||ms>windowEnd) continue;
      const clippedStart=new Date(Math.max(ms.getTime(),windowStart.getTime()));
      const clippedEnd=new Date(Math.min(me.getTime(),windowEnd.getTime()));
      const first=Math.max(0,Math.floor((clippedStart-windowStart)/(7*86400000)));
      const last=Math.min(7,Math.floor((clippedEnd-windowStart)/(7*86400000)));
      const split=MILESTONE_TEAM_SPLIT[m.key]||{RCPM:1};
      for(let i=first;i<=last;i++){
        const days=inclusiveOverlapDays(m.plannedStart,m.plannedEnd,buckets[i].start,buckets[i].end);
        if(!days) continue;
        for(const [team,share] of Object.entries(split)){
          const target=buckets[i].teams[team];
          if(!target) continue;
          target.raw+=days*typeFactor*storeScale*share;
          target.activities+=1;
        }
      }
    }
  }

  const combinedCapacity=TEAM_LOAD_CONFIG.reduce((sum,t)=>sum+t.capacity,0);
  return buckets.map((b,i)=>{
    const d=b.start, w=isoWeek(d);
    const teams=TEAM_LOAD_CONFIG.map(t=>({
      ...t,
      raw:b.teams[t.key].raw,
      pct:combinedCapacity?b.teams[t.key].raw/combinedCapacity*100:0,
      util:t.capacity?b.teams[t.key].raw/t.capacity*100:0,
      activities:b.teams[t.key].activities
    }));
    return {wk:"WK"+String(w).padStart(2,"0"),pct:teams.reduce((sum,x)=>sum+x.pct,0),teams,cur:i===1,prev:i===0};
  });
}
function renderImplementationLoad(bars){
  const legend=TEAM_LOAD_CONFIG.map(t=>`<span><i style="background:${t.color}"></i>${t.label}</span>`).join("");
  const columns=bars.map(b=>{
    const totalRaw=b.teams.reduce((sum,x)=>sum+x.raw,0)||1;
    const shown=Math.max(2,Math.min(100,b.pct));
    const segs=b.teams.filter(x=>x.raw>.01).map(x=>{
      const share=x.raw/totalRaw*100;
      const title=`${x.label}: ${Math.round(x.util)}% team capacity · ${x.activities} active milestone${x.activities===1?"":"s"}`;
      return `<div class="impl-seg" style="height:${share.toFixed(2)}%;background:${x.color}" title="${esc(title)}"></div>`;
    }).join("");
    return `<div class="impl-week ${b.cur?"cur":b.prev?"prev":""}"><div class="impl-bar-area"><div class="impl-stackbar ${b.pct>100?"over":""} ${b.cur?"current":""}" style="height:${shown}%"><span class="impl-total">${Math.round(b.pct)}%</span>${segs}</div></div></div>`;
  }).join("");
  const labels=bars.map(b=>`<div class="impl-wk ${b.cur?"cur":b.prev?"prev":""}">${b.wk}${b.cur?" ●":""}</div>`).join("");
  return `<div class="impl-legend">${legend}</div><div class="impl-chart"><div class="impl-axis"><span class="a100">100%</span><span class="a75">75%</span><span class="a50">50%</span><span class="a25">25%</span><span class="a0">0%</span></div><div class="impl-plot"><div class="impl-cols">${columns}</div></div><div class="impl-week-labels">${labels}</div></div><div class="impl-nav"><span style="color:var(--muted-2)">◀ previous</span><span style="color:var(--primary);font-weight:700">● current week</span><span>next 6 →</span></div>`;
}
function scheduleImplementationLoadRender(){
  const token=++implementationLoadRenderToken;
  const run=()=>{
    if(token!==implementationLoadRenderToken||activePage()!=="dashboard") return;
    const host=document.getElementById("implementationLoadChart");
    if(!host) return;
    try{
      const bars=buildImplementationLoadBars();
      if(token!==implementationLoadRenderToken||!document.body.contains(host)) return;
      host.innerHTML=renderImplementationLoad(bars);
    }catch(err){
      console.error("Implementation Load render failed",err);
      host.innerHTML=`<div class="empty">Implementation Load could not be calculated. Other dashboard functions remain available.</div>`;
    }
  };
  if("requestIdleCallback" in window) requestIdleCallback(run,{timeout:350});
  else requestAnimationFrame(()=>setTimeout(run,0));
}

function renderTrend(){
  const formats=filterValues("format");
  const fmt=formats;
  const fmtLabel=!formats.length?"All formats":formats.join(", ");
  const wkNow=isoWeek(today());
  const weeksInYr=isoWeeksInYear(SETTINGS.planYear);
  const from=Math.max(1,wkNow-Math.floor(trendSpan/2));
  const to=Math.min(weeksInYr,from+trendSpan-1);
  const rows=capacityTrend(fmt,from,to,SETTINGS.planYear);
  if(!rows.length) return "";
  const w=920,h=300,pad={l:56,r:20,t:24,b:46};
  const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const maxV=Math.max(100,...rows.flatMap(r=>[r.budget,r.booking,r.actual]));
  const maxR=Math.ceil(maxV/500)*500;
  const X=i=>pad.l+(rows.length===1?pw/2:i*(pw/(rows.length-1)));
  const Y=v=>pad.t+ph-(v/maxR)*ph;
  const line=k=>rows.map((r,i)=>`${X(i)},${Y(r[k])}`).join(" ");
  const dots=(k,c)=>rows.map((r,i)=>`<circle cx="${X(i)}" cy="${Y(r[k])}" r="4" fill="${c}"/>`).join("");
  const xl=rows.map((r,i)=>`<text x="${X(i)}" y="${h-16}" text-anchor="middle" font-size="11" font-weight="700" fill="#5f7184">${r.wk}</text>`).join("");
  const yt=[0,.25,.5,.75,1].map(t=>{const v=Math.round(maxR*t),y=Y(v);return `<line x1="${pad.l}" x2="${w-pad.r}" y1="${y}" y2="${y}" stroke="#e7eef6"/><text x="${pad.l-9}" y="${y+4}" text-anchor="end" font-size="10" fill="#8696a8">${v}</text>`;}).join("");
  const latest=rows[rows.length-1];
  const util=latest.budget?Math.round(latest.booking/latest.budget*100):0;
  const variance=latest.budget-latest.booking;
  return `<div class="card"><div class="section-title">Capacity Trend — Budget vs Booking vs Actual <span class="small">(${fmtLabel}, minutes, derived)</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px"><span class="small">Zoom</span><div class="segmented">
      <button onclick="zoomTrend(2)" title="Show fewer weeks (zoom in)" ${trendSpan<=4?"disabled":""}>−</button>
      <button style="min-width:70px;cursor:default">${rows.length} wks</button>
      <button onclick="zoomTrend(-2)" title="Show more weeks (zoom out)" ${trendSpan>=26?"disabled":""}>+</button></div></div></div>
    <svg class="trend-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Capacity trend">
      <text x="${pad.l}" y="15" font-size="11" font-weight="700" fill="#5f7184">Minutes</text>${yt}${xl}
      <polyline points="${line("budget")}" fill="none" stroke="#1d64d8" stroke-width="3.5" stroke-linejoin="round"/>
      <polyline points="${line("booking")}" fill="none" stroke="#e8930c" stroke-width="3.5" stroke-linejoin="round"/>
      <polyline points="${line("actual")}" fill="none" stroke="#16a76a" stroke-width="3.5" stroke-linejoin="round"/>
      ${dots("budget","#1d64d8")}${dots("booking","#e8930c")}${dots("actual","#16a76a")}
    </svg>
    <div class="trend-legend"><span><i class="legend-line" style="background:#1d64d8"></i>Budget (capacity)</span><span><i class="legend-line" style="background:#e8930c"></i>Booking (approved)</span><span><i class="legend-line" style="background:#16a76a"></i>Actual (completed)</span></div>
    <div class="trend-sum">
      <div class="tmini"><span class="small">Latest budget</span><b>${latest.budget}</b></div>
      <div class="tmini"><span class="small">Latest booking</span><b>${latest.booking}</b></div>
      <div class="tmini"><span class="small">Utilization</span><b>${util}%</b></div>
      <div class="tmini"><span class="small">Variance</span><b>${variance}</b><span class="small">${variance<0?"over budget":"remaining"}</span></div>
    </div></div>`;
}

/* ---------- 21a. KEY MILESTONE MASTER CRUD ---------- */
function milestoneProjectUsage(key){ return projects.filter(p=>(p.milestones||[]).some(m=>m.key===key)).length; }
function milestoneDependencyUsage(key){ return MILESTONES.filter(m=>m.dep===key).length; }
function openMilestoneModal(key=""){
  if(!can("master")){ alert("Only Admin can edit master data."); return; }
  const m=key?MILESTONES.find(x=>x.key===key):null;
  const used=m?milestoneProjectUsage(m.key):0;
  const depUsed=m?milestoneDependencyUsage(m.key):0;
  const codeLocked=!!m && (used>0 || depUsed>0);
  const depOptions=[`<option value="">None</option>`, ...MILESTONES.filter(x=>!m||x.key!==m.key).map(x=>`<option value="${x.key}" ${m&&m.dep===x.key?"selected":""}>${x.key} — ${esc(x.full)}</option>`)].join("");
  document.getElementById("genModalInner").innerHTML=`
    <div class="modal-head"><h2>${m?"Edit Key Milestone":"Add Key Milestone"}</h2><button class="x" onclick="closeModal('genModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-grid" style="grid-template-columns:1fr 1.6fr">
        <div class="ff"><label>Milestone Code <span class="req">*</span></label><input id="msKey" value="${m?esc(m.key):""}" placeholder="e.g. QA" ${codeLocked?"readonly":""}></div>
        <div class="ff"><label>Milestone Name <span class="req">*</span></label><input id="msFull" value="${m?esc(m.full):""}" placeholder="e.g. Quality Review & Sign-off"></div>
        <div class="ff"><label>Depends On</label><select id="msDep">${depOptions}</select></div>
        <div class="ff"><label>Offset from Kick-off (days)</label><input id="msOffset" type="number" min="0" value="${m?m.offset:0}"></div>
        <div class="ff"><label>Duration (days)</label><input id="msDur" type="number" min="1" value="${m?m.dur:1}"></div>
        <div class="ff"><label>At-risk warning (days)</label><input id="msWarn" type="number" min="0" value="${m?m.warn:2}"></div>
      </div>
      <div id="msErr" class="small" style="color:var(--red);margin-top:8px"></div>
      ${m?`<div class="banner info" style="margin-top:12px;margin-bottom:0">Usage check: <b>&nbsp;${used}&nbsp;</b> project(s) use this milestone code${depUsed?` and <b>&nbsp;${depUsed}&nbsp;</b> milestone(s) depend on it`:""}. ${codeLocked?"Code is locked while in use; edit operational details only.":"Code can be changed because it is not currently used."}</div>`:""}
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal('genModal')">Cancel</button><button class="btn primary" onclick="saveMilestone('${m?m.key:""}')">Save</button></div>`;
  document.getElementById("genModal").classList.add("active");
}
function saveMilestone(originalKey=""){
  if(!can("master")){ alert("Only Admin can edit master data."); return; }
  const err=document.getElementById("msErr");
  const key=normalizeMilestoneKey(document.getElementById("msKey").value);
  const full=document.getElementById("msFull").value.trim();
  const dep=document.getElementById("msDep").value||null;
  const offset=Number(document.getElementById("msOffset").value||0);
  const dur=Number(document.getElementById("msDur").value||0);
  const warn=Number(document.getElementById("msWarn").value||0);
  if(!key||!/^[A-Z0-9_-]{2,12}$/.test(key)){ err.innerText="Milestone code is required and must use 2-12 characters: A-Z, 0-9, _ or -."; return; }
  if(!full){ err.innerText="Milestone name is required."; return; }
  if(dep===key){ err.innerText="A milestone cannot depend on itself."; return; }
  if(offset<0||dur<1||warn<0){ err.innerText="Offset must be 0 or more; duration must be at least 1 day; warning days must be 0 or more."; return; }
  if(MILESTONES.some(m=>m.key!==originalKey&&m.key===key)){ err.innerText="Milestone code already exists."; return; }
  const existing=originalKey?MILESTONES.find(m=>m.key===originalKey):null;
  if(existing && originalKey!==key && (milestoneProjectUsage(originalKey)>0 || milestoneDependencyUsage(originalKey)>0)){
    err.innerText="Milestone code cannot be changed while it is used by project timelines or dependencies."; return;
  }
  const payload={key,full,dep,offset,dur,warn};
  if(existing){ Object.assign(existing,payload); MILESTONES.forEach(m=>{ if(m.dep===originalKey) m.dep=key; }); }
  else { MILESTONES.push(payload); }
  MILESTONES=normalizeMilestones(MILESTONES).sort((a,b)=>a.offset-b.offset||a.key.localeCompare(b.key));
  rebuildMSMap(); saveState(); closeModal("genModal"); renderAll();
}
function deleteMilestone(key){
  if(!can("master")){ alert("Only Admin can edit master data."); return; }
  const m=MILESTONES.find(x=>x.key===key); if(!m) return;
  const used=milestoneProjectUsage(key), depUsed=milestoneDependencyUsage(key);
  if(MILESTONES.length<=1){ alert("Blocked: at least one milestone must remain in the master."); return; }
  if(used>0){ alert(`Blocked: ${key} is currently used in ${used} project timeline(s). Delete is allowed only when the milestone has no active usage.`); return; }
  if(depUsed>0){ alert(`Blocked: ${key} is referenced as a dependency by ${depUsed} milestone(s). Remove those dependencies before deleting.`); return; }
  if(!confirm(`Delete milestone ${key} — ${m.full}?

This action is allowed because no project timeline is using this milestone.`)) return;
  MILESTONES=MILESTONES.filter(x=>x.key!==key); rebuildMSMap();
  setFilterValues("milestone",filterValues("milestone").filter(v=>v!==key));
  saveState(); renderAll();
}

function saveStore(id){
  const no=document.getElementById("stNo").value.trim(), name=document.getElementById("stName").value.trim();

function deleteStore(id){

  const s=stores.find(x=>x.id===id); if(!s)return;

  stores=stores.filter(x=>x.id!==id);

function exportStoresCSV(){ const rows=[["No","Name","Format","Zone","Capacity"]]; stores.forEach(s=>rows.push([s.no,s.name,s.format,s.zone,s.capacity])); download("store-master.csv",rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n"),"text/csv"); }

function parseCSV(text){
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===","){row.push(cur);cur="";} else if(c==="\n"){row.push(cur);rows.push(row);row=[];cur="";} else if(c!=="\r")cur+=c; } }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}
function ensureXLSX(){ return new Promise((res,rej)=>{ if(window.XLSX)return res(window.XLSX); const sc=document.createElement("script"); sc.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"; sc.onload=()=>res(window.XLSX); sc.onerror=()=>rej(new Error("offline")); document.head.appendChild(sc); }); }
async function importStoresFile(input){
  const file=input.files&&input.files[0]; if(!file)return; input.value="";
  try{
    let rows;
    if(/\.csv$/i.test(file.name)){ rows=parseCSV(await file.text()); }
    else {
      const XLSX=await ensureXLSX().catch(()=>null);
      if(!XLSX){ alert("Reading .xlsx needs internet access (SheetJS library). On an offline machine, open the file in Excel and Save As CSV, then import the .csv."); return; }
      const wb=XLSX.read(await file.arrayBuffer(),{type:"array"}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true});
    }
    if(!rows||rows.length<2){ alert("No data rows found (expected a header row + data)."); return; }
    const head=rows[0].map(h=>String(h).trim().toLowerCase());
    const ci=n=>head.indexOf(n);
    const iNo=ci("no"),iName=ci("name"),iFmt=ci("format"),iZone=ci("zone"),iCap=ci("capacity");
    if(iNo<0||iName<0||iFmt<0){ alert("Header row must include at least: No, Name, Format (optional: Zone, Capacity)."); return; }
    const append=confirm(`Found ${rows.length-1} data row(s).\n\nOK = ADD / update into existing stores\nCancel = REPLACE all stores with the file`);
    const parsed=[]; let skipped=0;
    rows.slice(1).forEach(r=>{
      const no=String(r[iNo]??"").trim(), name=String(r[iName]??"").trim();
      const fmt=FORMATS.find(f=>f.toLowerCase()===String(r[iFmt]??"").trim().toLowerCase());
      if(!no||!name||!fmt){ skipped++; return; }
      const zone=iZone>=0&&String(r[iZone]??"").trim()?String(r[iZone]).trim():ZONES[0];
      const cap=(iCap>=0&&r[iCap]!==""&&r[iCap]!=null)?Number(r[iCap])||CAP_BY_FORMAT[fmt]:CAP_BY_FORMAT[fmt];
      parsed.push({no,name,format:fmt,zone,capacity:cap});
    });
    if(!parsed.length){ alert("No valid rows. Each row needs No, Name and a Format of Hyper / Super / Mini."); return; }
    if(!append) stores=[];
    parsed.forEach(p=>{ const ex=stores.find(s=>s.no===p.no); if(ex)Object.assign(ex,p); else stores.push({id:"S-"+nextStoreId(),...p}); });
    saveState(); renderAll();
    alert(`Imported ${parsed.length} store(s)${skipped?`, skipped ${skipped} invalid row(s)`:""}.\nTotal stores now: ${stores.length}.`);
  }catch(e){ alert("Import failed: "+e.message); }
}

function nextId(){ let n=1000; projects.forEach(p=>{const v=Number(String(p.id).replace("P-",""));if(v>=n)n=v+1;}); return n; }
function validate(p){
  const errs={};
  if(!p.code) errs.fCode=1;
  else if(projects.some(x=>x.id!==p.id&&x.code===p.code)) errs.fCode=1;
  if(!p.name) errs.fName=1;
  if(!p.type) errs.fType=1;
  if(!p.division) errs.fDivision=1;
  if(!p.department) errs.fDepartment=1;
  if(!p.format) errs.fFormat=1;
  if(!p.owner) errs.fOwner=1;
  if(!p.minutesPerStore || p.minutesPerStore<=0) errs.fMin=1;
  if(!p.start) errs.fStart=1;
  if(!p.end||!p.start||parseDate(p.end)<=parseDate(p.start)) errs.fEnd=1;
  // milestones are manually defined; both dates are required and must be ordered within the project window
  const badMs=[];
  p.milestones.forEach(m=>{
    if(!m.plannedStart || !m.plannedEnd){ badMs.push(m.key); return; }
    if(parseDate(m.plannedEnd)<parseDate(m.plannedStart)) badMs.push(m.key);
    if(p.start&&p.end&&(parseDate(m.plannedStart)<parseDate(p.start)||parseDate(m.plannedEnd)>addDays(parseDate(p.end),1))) badMs.push(m.key);
  });

}
function updateCapPreview(){

  const impMs=p.milestones.find(m=>m.key==="IMP");
  if(!impMs||!impMs.plannedStart){ box.innerHTML=`<div class="cap-preview warn">Set IMP planned start date to calculate capacity impact.</div>`; return; }
  const imp=projectCapacityImpact(p);
  let cls="ok",msg=`<b>Capacity OK.</b> Peak utilization ${imp.max}% in ${imp.week} across selected stores.`;
  if(imp.max>SETTINGS.capacityBlock){ cls="block"; msg=`<b>Overload — approval will be blocked.</b> Peak ${imp.max}% in ${imp.week}. ${imp.overloaded.length} store(s) exceed ${SETTINGS.capacityBlock}%: ${imp.overloaded.slice(0,4).map(o=>o.store.no+" ("+o.util+"%)").join(", ")}${imp.overloaded.length>4?"…":""}. ${can("override")?"As Approver you may override with a reason at approval.":"Reduce stores or shift the IMP week."}`; }
  else if(imp.max>=SETTINGS.capacityWarn){ cls="warn"; msg=`<b>Watch.</b> Peak ${imp.max}% in ${imp.week} — within ${SETTINGS.capacityWarn}–${SETTINGS.capacityBlock}%. Reviewer confirmation recommended.`; }
  box.innerHTML=`<div class="cap-preview ${cls}">${msg}</div>`;
}
function savePlan(draft){
  const p=collectModal();
  if(draft)p.approval="Draft";
  const v=validate(p);
  // paint errors
  ["fCode","fName","fType","fDivision","fDepartment","fFormat","fMin","fOwner","fStart","fEnd"].forEach(idd=>{const el=document.getElementById(idd)?.closest(".ff");if(el)el.classList.toggle("err",!!v.errs[idd]);});
  document.querySelectorAll(".ms-s,.ms-e").forEach(el=>el.classList.toggle("bad",v.badMs.includes(el.dataset.k)));
  const errCount=Object.keys(v.errs).length+(v.storeErr?1:0)+(v.badMs.length?1:0);
  if(errCount){ document.getElementById("formErr").innerHTML=`<span style="color:var(--red)">Fix ${errCount} issue(s): ${[Object.keys(v.errs).length?"fields":"",v.storeErr?"no stores selected":"",v.badMs.length?"milestone dates ("+[...new Set(v.badMs)].join(",")+")":""].filter(Boolean).join(" · ")}</span>`; return; }
  // rule engine: block overload approval unless override
  if(!draft && p.approval==="Approved"){
    const imp=projectCapacityImpact(p);
    if(imp.max>SETTINGS.capacityBlock){
      if(!can("override")){ alert(`Cannot approve: ${imp.week} overloaded at ${imp.max}%. Only an Approver can override. Saving as Pending Review instead.`); p.approval="Pending Review"; }
      else { const reason=prompt(`Overload ${imp.max}% in ${imp.week}. Enter override reason to approve:`); if(!reason){p.approval="Pending Review";} else { p.overrideReason=reason; } }
    }
  }
  const existing=projects.find(x=>x.id===p.id);
  p.history = existing?[...(existing.history||[]),{by:p.owner,role,action:draft?"Saved draft":"Updated plan",note:p.overrideReason||"",ts:localISO(today())+"T"+new Date().toTimeString().slice(0,5)}]
    :[{by:p.owner,role,action:"Created plan",note:"",ts:localISO(today())+"T"+new Date().toTimeString().slice(0,5)}];
  const idx=projects.findIndex(x=>x.id===p.id);
  if(idx>=0)projects[idx]=p; else projects.push(p);
  saveState(); closeModal("planModal"); navigate("gantt");
}

const NEXT_STEP_STATUSES=["Not Started","In Progress","Completed","Blocked","On Hold"];
function newNextStepId(){ return "NS-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,7); }
function validNextStepId(id){ return /^[A-Za-z0-9_-]+$/.test(String(id||""))?String(id):newNextStepId(); }
function normalizeNextStepStatus(status){ return NEXT_STEP_STATUSES.includes(status)?status:"Not Started"; }
function syncLegacyNextStepFields(m){

function normalizeMilestoneNextSteps(m){
  if(!m||typeof m!=="object") return m;
  let raw=Array.isArray(m.nextSteps)?m.nextSteps:null;
  if(!raw){
    const legacyText=String(m.nextStep||"").trim();
    raw=legacyText?[{id:newNextStepId(),text:legacyText,dueDate:m.nextStepDue||m.plannedEnd||"",status:normalizeNextStepStatus(m.nextStepStatus),createdAt:"",updatedAt:""}]:[];
  }
  m.nextSteps=raw.filter(x=>x&&typeof x==="object").map(x=>({
    id:validNextStepId(x.id),
    text:String(x.text??x.nextStep??x.description??"").trim(),
    dueDate:String(x.dueDate??x.nextStepDue??x.due??""),
    status:normalizeNextStepStatus(x.status??x.nextStepStatus),
    createdAt:String(x.createdAt||""),
    updatedAt:String(x.updatedAt||"")
  }));
  syncLegacyNextStepFields(m);
  return m;
}

function detailGanttRange(p){

  let max=valid.length?new Date(Math.max(...valid.map(m=>parseDate(m.plannedEnd)))):parseDate(p.end||localISO(today()));

  else if(viewMode==="week"){ min=mondayOfWeek(min); max=addDays(mondayOfWeek(max),6); }

function activityNextStepSummary(m){

  const statusEl=document.getElementById(`ns-status-${projectId}-${key}-${stepId}`);
  const saveBtn=document.getElementById(`ns-save-${projectId}-${key}-${stepId}`);
  if(!textEl||!dueEl||!statusEl||!saveBtn)return;
  const text=textEl.value.trim(), dueDate=dueEl.value||"", status=statusEl.value||"Not Started";
  const dirty=text!==(step.text||"").trim() || dueDate!==(step.dueDate||"") || status!==(step.status||"Not Started");
  const enabled=Boolean(text)&&dirty;
  saveBtn.disabled=!enabled;
  saveBtn.title=enabled?"Save changes":"No new data or changes to save";
  saveBtn.setAttribute("aria-disabled",String(!enabled));
}
function saveActivityNextStep(projectId,key,stepId){
  if(!can("edit")){ alert("Your role cannot edit activity next steps."); return; }
  const {p,m}=getActivity(projectId,key); if(!p||!m)return;
  const step=m.nextSteps.find(x=>x.id===stepId); if(!step)return;
  const saveBtn=document.getElementById(`ns-save-${projectId}-${key}-${stepId}`);
  if(saveBtn?.disabled)return;
  const text=document.getElementById(`ns-text-${projectId}-${key}-${stepId}`)?.value.trim()||"";
  if(!text){ document.getElementById(`ns-text-${projectId}-${key}-${stepId}`)?.focus(); return; }
  step.text=text;
  step.dueDate=document.getElementById(`ns-due-${projectId}-${key}-${stepId}`)?.value||"";
  step.status=document.getElementById(`ns-status-${projectId}-${key}-${stepId}`)?.value||"Not Started";
  step.updatedAt=new Date().toISOString(); if(!step.createdAt)step.createdAt=step.updatedAt;
  syncLegacyNextStepFields(m);
  logHist(p,"Updated next step",`${key}: ${step.text}${step.dueDate?` · due ${step.dueDate}`:""} · ${step.status}`);
  saveState(); renderPage("detailplan");
}
let pendingNextStepDelete=null;
function deleteActivityNextStep(projectId,key,stepId){
  if(!can("edit")){ alert("Your role cannot delete activity next steps."); return; }
  const {p,m}=getActivity(projectId,key); if(!p||!m)return;
  const step=m.nextSteps.find(x=>x.id===stepId); if(!step)return;
  pendingNextStepDelete={projectId,key,stepId};
  document.getElementById("genModalInner").innerHTML=`
    <div class="modal-head"><h2>Confirm Delete Next Step</h2><button class="x" onclick="cancelDeleteActivityNextStep()">✕</button></div>
    <div class="modal-body"><div class="delete-confirm-body"><div class="delete-confirm-icon">!</div><div class="delete-confirm-copy"><p>Delete this Next Step from <b>${esc(key)} — ${esc(MSMAP[key]?.full||key)}</b>?</p><div class="delete-confirm-item">${esc(step.text||"Blank next step")}${step.dueDate?`<div class="small" style="margin-top:4px">Due ${esc(step.dueDate)} · ${esc(step.status||"Not Started")}</div>`:""}</div><p class="small" style="margin-top:9px">This action cannot be undone.</p></div></div></div>
    <div class="modal-foot"><button class="btn" onclick="cancelDeleteActivityNextStep()">Cancel</button><button class="btn danger" onclick="confirmDeleteActivityNextStep()">Delete Next Step</button></div>`;
  document.getElementById("genModal").classList.add("active");
}
function cancelDeleteActivityNextStep(){ pendingNextStepDelete=null; closeModal("genModal"); }
function confirmDeleteActivityNextStep(){
  const pending=pendingNextStepDelete; pendingNextStepDelete=null;
  if(!pending){ closeModal("genModal"); return; }
  const {p,m}=getActivity(pending.projectId,pending.key); if(!p||!m){ closeModal("genModal"); return; }
  const idx=m.nextSteps.findIndex(x=>x.id===pending.stepId); if(idx<0){ closeModal("genModal"); return; }
  const step=m.nextSteps[idx];
  m.nextSteps.splice(idx,1); syncLegacyNextStepFields(m);
  logHist(p,"Deleted next step",`${pending.key}: ${step.text||"Blank next step"}`);
  saveState(); closeModal("genModal"); renderPage("detailplan");
}
function saveAllActivityNextSteps(projectId){
  if(!can("edit")){ alert("Your role cannot edit activity next steps."); return; }
  const p=projects.find(x=>x.id===projectId); if(!p)return;
  let saved=0,blank=0;
  (p.milestones||[]).forEach(m=>{
    normalizeMilestoneNextSteps(m);
    m.nextSteps.forEach(step=>{
      const textEl=document.getElementById(`ns-text-${projectId}-${m.key}-${step.id}`);
      if(!textEl)return;
      const text=textEl.value.trim();
      if(!text){ blank++; return; }
      step.text=text;
      step.dueDate=document.getElementById(`ns-due-${projectId}-${m.key}-${step.id}`)?.value||"";
      step.status=document.getElementById(`ns-status-${projectId}-${m.key}-${step.id}`)?.value||"Not Started";
      step.updatedAt=new Date().toISOString(); if(!step.createdAt)step.createdAt=step.updatedAt;
      saved++;
    });
    syncLegacyNextStepFields(m);
  });
  logHist(p,"Updated activity next steps",`Saved ${saved} next step${saved===1?"":"s"}${blank?` · ${blank} blank item${blank===1?"":"s"} skipped`:""}`);
  saveState(); renderPage("detailplan");
  if(blank) alert(`${blank} blank next step${blank===1?" was":"s were"} not saved. Enter a description or delete the blank item.`);
}
function renderNextStepItem(p,m,step,index,editable){
  const dueOver=step.dueDate&&parseDate(step.dueDate)<today()&&step.status!=="Completed";
  const changeHandler=`updateNextStepSaveState('${p.id}','${m.key}','${step.id}')`;
  return `<div class="nextstep-item"><div class="nextstep-index">${index+1}</div><div class="nextstep-field"><label for="ns-text-${p.id}-${m.key}-${step.id}">Next Step</label><input class="nextstep-input" id="ns-text-${p.id}-${m.key}-${step.id}" aria-label="Next Step ${index+1}" title="Next Step ${index+1}" value="${esc(step.text||"")}" placeholder="Enter next action / deliverable" ${editable?`oninput="${changeHandler}"`:"disabled"}></div><div class="nextstep-field"><label for="ns-due-${p.id}-${m.key}-${step.id}">Due Date</label><input class="nextstep-input ${dueOver?"due-over":""}" id="ns-due-${p.id}-${m.key}-${step.id}" aria-label="Due Date" title="${dueOver?"Overdue":"Due Date"}" type="date" value="${step.dueDate||""}" ${editable?`onchange="${changeHandler}"`:"disabled"}></div><div class="nextstep-field"><label for="ns-status-${p.id}-${m.key}-${step.id}">Status</label><select class="nextstep-input nextstep-status" id="ns-status-${p.id}-${m.key}-${step.id}" aria-label="Next Step Status" title="Next Step Status" ${editable?`onchange="${changeHandler}"`:"disabled"}>${NEXT_STEP_STATUSES.map(x=>`<option ${step.status===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="nextstep-actions">${editable?`<button class="btn sm primary nextstep-save" id="ns-save-${p.id}-${m.key}-${step.id}" title="No new data or changes to save" aria-disabled="true" disabled onclick="saveActivityNextStep('${p.id}','${m.key}','${step.id}')">Save</button><button class="btn sm danger nextstep-delete" title="Delete Next Step" onclick="deleteActivityNextStep('${p.id}','${m.key}','${step.id}')">Delete</button>`:'<span class="small">View only</span>'}</div></div>`;
}
function renderActivityNextStepCard(p,m,editable){
  normalizeMilestoneNextSteps(m);
  const activityState=msState(m),steps=m.nextSteps||[];
  const stack=steps.length?steps.map((step,i)=>renderNextStepItem(p,m,step,i,editable)).join(""):`<div class="nextstep-empty">No next step recorded.${editable?' Click <b>+ Add Next Step</b> to create the first action.':''}</div>`;
  return `<div class="activity-nextstep-card" id="activity-card-${p.id}-${m.key}"><div class="activity-nextstep-head"><div class="activity-main"><div><span class="activity-code" style="background:${milestoneColor(m.key)}">${esc(m.key)}</span><b>${esc(MSMAP[m.key]?.full||m.key)}</b> <span class="nextstep-count">${steps.length}</span></div><div class="small">Owner: ${esc(m.owner||p.owner)} · Planned ${m.plannedStart} → ${m.plannedEnd}</div></div><div class="activity-meta"><span class="pill st-${activityState==="InProgress"?"OnTrack":activityState}">${statusText(activityState)}</span>${editable?`<button class="btn sm primary" onclick="addActivityNextStep('${p.id}','${m.key}')">+ Add Next Step</button>`:""}</div></div><div class="nextstep-stack">${stack}</div></div>`;
}
function renderDetailPlan(){
  const list=detailProjectList();
  if(!list.length) return `<div class="empty">No projects available.</div>`;
  if(!detailProjectId||!list.some(p=>p.id===detailProjectId)) detailProjectId=list[0].id;
  const p=ensureDetailFields(list.find(x=>x.id===detailProjectId));
  const imp=projectCapacityImpact(p), pct=projPercent(p), st=projState(p);
  const editable=can("edit");
  const activityCards=(p.milestones||[]).map(m=>renderActivityNextStepCard(p,m,editable)).join("");
  return `${detailToolbar(p,list)}${renderProjectGantt(p)}<div class="detail-summary"><div class="mini"><span>Status</span><b>${pill(st)} ${pct}%</b></div><div class="mini"><span>Approval</span><b>${apvTag(p.approval)}</b></div><div class="mini"><span>Owner</span><b>${esc(p.owner)}</b></div><div class="mini"><span>Scope</span><b>${p.division} / ${esc(p.department)} / ${p.format}</b></div><div class="mini"><span>Stores</span><b>${p.storeIds.length.toLocaleString()}</b></div><div class="mini"><span>Peak Capacity</span><b>${imp.max}% · ${imp.week}</b></div></div><div class="card detail-activity-section" style="margin-top:14px"><div class="section-title">Activity Next Steps <span class="small">Multiple actions can be stacked under each activity</span>${editable?`<button class="btn sm primary" style="margin-left:auto" onclick="saveAllActivityNextSteps('${p.id}')">Save All Changes</button>`:""}</div><div class="activity-stack">${activityCards}</div></div><div class="card"><div class="section-title">History / Audit</div><ul class="hist">${(p.history||[]).slice().reverse().map(h=>`<li><span class="dot" style="background:var(--primary)"></span><div><b>${h.action}</b> ${h.note?'· '+esc(h.note):''}<div class="meta">${esc(h.by)} (${h.role}) · ${h.ts.replace("T"," ")}</div></div></li>`).join("")||'<li class="small">No history.</li>'}</ul><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">${can("approve")&&["Pending Review","Need Revision"].includes(p.approval)?`<button class="btn success" onclick="approvePlan('${p.id}')">Approve</button><button class="btn danger" onclick="rejectPlan('${p.id}')">Reject</button>`:""}${can("edit")?`<button class="btn" onclick="openPlanModal('${p.id}')">Edit Plan</button>`:""}</div></div>`;
}

/* ---------- 25. DETAIL / HISTORY ---------- */

function openDetail(id){ openDetailPlan(id); }

/* ---------- 26. ACTIONS (rule-aware) ---------- */
function logHist(p,action,note){ p.history=p.history||[]; p.history.push({by:"You",role,action,note:note||"",ts:localISO(today())+"T"+new Date().toTimeString().slice(0,5)}); }
function approvePlan(id){
  if(!can("approve")){ alert("Only Approver/Admin can approve."); return; }
  const p=projects.find(x=>x.id===id);
  const imp=projectCapacityImpact(p);
  if(imp.max>SETTINGS.capacityBlock){
    if(!can("override")){ alert(`Blocked: ${imp.week} at ${imp.max}% (> ${SETTINGS.capacityBlock}%).`); return; }
    const reason=prompt(`Overload ${imp.max}% in ${imp.week}. Override reason required to approve:`);
    if(!reason){ return; } p.overrideReason=reason; logHist(p,"Capacity override",reason);
  }
  p.approval="Approved"; if(p.statusOverride==="Cancelled")p.statusOverride=null;
  logHist(p,"Approved");
  saveState(); renderAll();
}
function rejectPlan(id){
  if(!can("approve")){ alert("Only Approver/Admin can reject."); return; }
  const reason=prompt("Rejection reason:","Needs revision"); if(reason===null)return;
  const p=projects.find(x=>x.id===id); p.approval="Rejected"; logHist(p,"Rejected",reason); saveState(); renderAll();
}
function cancelPlan(id){
  if(!can("cancel")){ alert("Your role cannot cancel plans."); return; }
  const reason=prompt("Cancel reason:","Business / timeline changed"); if(reason===null)return;
  const p=projects.find(x=>x.id===id); p.statusOverride="Cancelled"; p.cancelReason=reason; logHist(p,"Cancelled",reason); saveState(); renderAll();
}

/* ---------- 26. EXPORTS ---------- */
function download(name,content,type){ const b=new Blob([content],{type}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u;a.download=name;a.click();URL.revokeObjectURL(u); }
function exportCSV(){
  const rows=[["Code","Name","Type","Division","Department","Owner","Format","Stores","Start","End","Status","Approval","Progress%"]];
  filteredProjects().forEach(p=>rows.push([p.code,p.name,p.type,p.division,p.department,p.owner,p.format,p.storeIds.length,p.start,p.end,projState(p),p.approval,projPercent(p)]));
  download("one-plan-projects.csv", rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n"),"text/csv");
}
function exportCapacityCSV(){
  const wk=isoWeek(today()),yr=isoWeekYear(today());
  const rows=[["Store","Name","Format","Zone","Capacity","Planned","Util%","Status","Week"]];
  stores.forEach(s=>{const u=storeUtil(s,wk,yr);rows.push([s.no,s.name,s.format,s.zone,s.capacity,u.load.planned,u.util,u.status,"WK"+String(wk).padStart(2,"0")]);});
  download("one-plan-capacity.csv", rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n"),"text/csv");
}
function exportJSON(){ download(SETTINGS.dataFileName||"one-plan-data.json", JSON.stringify({settings:SETTINGS,milestones:MILESTONES,stores,projects},null,2),"application/json"); }
function resetData(){ if(confirm("Reset all demo data?")){ localStorage.removeItem(LS); SETTINGS.simulatedToday=null; MILESTONES=DEFAULT_MILESTONES.map(m=>({...m})); rebuildMSMap(); rebuildSeed(); saveState(); renderAll(); } }



/* ---------- 29. STABLE BOOT + SHAREPOINT MULTI-USER SYNC ADD-ON ---------- */
function onePlanShowBootError(message){
  try{
    const box=document.createElement("div");
    box.style.cssText="position:fixed;right:18px;bottom:18px;z-index:9999;max-width:520px;background:#fde6e6;border:1px solid #f3bcbc;color:#7f1d1d;border-radius:14px;padding:14px 16px;box-shadow:0 12px 34px rgba(0,0,0,.18);font-family:Arial,sans-serif;font-size:13px;line-height:1.45";
    box.innerHTML="<b>One Plan boot warning</b><br>"+String(message).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))+"<br><button style='margin-top:10px;padding:7px 10px;border-radius:8px;border:1px solid #f3bcbc;background:#fff;cursor:pointer' onclick='localStorage.removeItem(\""+LS+"\");location.reload()'>Reset local app cache</button>";
    document.body.appendChild(box);
  }catch(e){}
}
window.addEventListener("error", e=>onePlanShowBootError(e.message||e.error||"Unknown runtime error"));
window.addEventListener("unhandledrejection", e=>onePlanShowBootError((e.reason&&e.reason.message)||e.reason||"Unknown async error"));
function onePlanRepairData(){
  let changed=false;
  try{
    if(!SETTINGS || typeof SETTINGS!=="object"){ SETTINGS={simulatedToday:null,planYear:new Date().getFullYear(),capacityWarn:80,capacityBlock:100,storageProvider:"server-json",dataPath:"/api/state",dataFileName:"oneplan-state.json",syncMode:"auto"}; changed=true; }
    MILESTONES = normalizeMilestones(MILESTONES);
    rebuildMSMap();
    if(!Array.isArray(stores) || !stores.length){ stores=seedStores(); changed=true; }
    if(!Array.isArray(projects) || !projects.length){ projects=seedProjects(stores); changed=true; }
    projects.forEach(p=>{
      if(!Array.isArray(p.storeIds)) { p.storeIds=[]; changed=true; }
      if(!Array.isArray(p.milestones) || !p.milestones.length){
        const s=p.start||localISO(today());
        p.milestones=MILESTONES.map(m=>({key:m.key,plannedStart:localISO(addDays(parseDate(s),m.offset)),plannedEnd:localISO(addDays(parseDate(s),m.offset+m.dur-1)),status:"Upcoming"}));
        changed=true;
      }
      p.milestones=p.milestones.filter(m=>m && m.key && m.plannedStart && m.plannedEnd);
      p.milestones.forEach(m=>{
        const before=JSON.stringify({nextSteps:m.nextSteps,nextStep:m.nextStep,nextStepDue:m.nextStepDue,nextStepStatus:m.nextStepStatus});
        normalizeMilestoneNextSteps(m);
        const after=JSON.stringify({nextSteps:m.nextSteps,nextStep:m.nextStep,nextStepDue:m.nextStepDue,nextStepStatus:m.nextStepStatus});
        if(before!==after) changed=true;
      });
      if(!p.minutesPerStore) p.minutesPerStore=LOAD_BY_TYPE[p.type]||120;
      if(!p.approval) p.approval="Draft";
    });
    if(changed) saveState();
  }catch(e){
    console.error("Repair failed, rebuilding seed data", e);
    try{ MILESTONES=DEFAULT_MILESTONES.map(m=>({...m})); rebuildMSMap(); rebuildSeed(); saveState(); }catch(_e){}
  }
}
const onePlanBaseLoadState = loadState;
loadState = function(){ onePlanBaseLoadState(); onePlanRepairData(); };

// SharePoint file sync removed. Storage is now handled by the AI Radar-style server state API.
SETTINGS.storageProvider="server-json";
SETTINGS.dataPath="/api/state";
SETTINGS.dataFileName="oneplan-state.json";
SETTINGS.syncMode="auto";

/* ---------- 27. RENDER DISPATCH ---------- */
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDetailMilestone(); });

const RENDER={dashboard:renderDashboard,gantt:renderGantt,detailplan:renderDetailPlan,plans:renderPlans,approval:renderApproval,
  planload:renderPlanLoad,storecapacity:renderStoreCapacity,calendar:renderCalendar,reports:renderReports,master:renderMaster,settings:renderSettings};
function renderPage(page){ const fn=RENDER[page]; if(fn)document.getElementById(page).innerHTML=fn(); if(page==="dashboard") scheduleImplementationLoadRender(); }
function activePage(){ return document.querySelector(".page.active").id; }
function updateBadges(){
  const wk=isoWeek(today()),yr=isoWeekYear(today());
  const pend=projects.filter(p=>p.approval==="Pending Review").length;
  const risk=projects.filter(p=>["AtRisk","Delayed"].includes(projState(p))).length;
  const over=stores.filter(s=>storeUtil(s,wk,yr).status==="Over").length;
  document.getElementById("notiCount").innerText=pend+risk+over;
  const setB=(page,n)=>{const b=document.getElementById("badge-"+page);if(!b)return;if(n>0){b.style.display="";b.innerText=n;}else b.style.display="none";};
  setB("approval",pend); setB("storecapacity",over);
}
function renderAll(){ renderPage(activePage()); updateBadges(); }

/* ---------- 28. WIRE-UP + INIT ---------- */
let globalSearchTimer=null;
document.getElementById("globalSearch").addEventListener("input",e=>{
  const value=e.target.value;
  clearTimeout(globalSearchTimer);
  globalSearchTimer=setTimeout(()=>{ F.q=value; plansPage=1; storeCapacityPage=1; renderAll(); },180);
});
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){closeModal("planModal");closeModal("genModal");} });
[ "planModal","genModal" ].forEach(id=>document.getElementById(id).addEventListener("click",e=>{ if(e.target.id===id)closeModal(id); }));

async function onePlanStart(){
  loadState();
  buildMenu();
  setRole("Admin",true);
  navigate("dashboard");
  updateBadges();
  await cloudBoot();
}
onePlanStart();

  setTimeout(()=>alert("OnePlan opened in Fresh Boot mode. Existing browser cache was ignored but not deleted; cloud state will still be loaded when available."),100);
}
if(ONEPLAN_RESET_BOOT){
  try{ history.replaceState(null,"",window.location.pathname); }catch(e){}
}
